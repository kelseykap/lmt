<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LM Training">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Lisbon Marathon 2026 Training Plan">
<link rel="manifest" href="manifest.json">
<title>LMT</title>
<link rel="icon" type="image/png" href="logo-3.png">
<link rel="apple-touch-icon" href="logo-3.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Helvetica,Arial,sans-serif;background:#F5F5F5;color:#3C3C3C;font-size:17px;}

/* ── PALETTE ──
  teal   #087E8B
  coral  #E8501A
  dark   #3C3C3C
  light  #F5F5F5
  mauve  #C1839F
*/

/* ══════════════════════════════════════════════
   APP SHELL LAYOUT
══════════════════════════════════════════════ */

/* ── HOME SCREEN ── */
#home-screen{
  position:fixed;inset:0;z-index:10;
  background:#fff;
  display:flex;flex-direction:column;
  align-items:center;
  padding:env(safe-area-inset-top,0) 0 0;
  transition:transform 0.42s cubic-bezier(.4,0,.2,1), opacity 0.3s;
}
#home-screen.hidden{
  transform:translateY(-30px);
  opacity:0;
  pointer-events:none;
}
#home-header{
  padding:48px 0 0;
  display:flex;justify-content:center;
}
#home-header img{
  height:90px;width:90px;
  object-fit:contain;
  border-radius:12px;
}
#home-quote-wrap{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:0 32px;
  text-align:center;
}
#home-quote{
  font-family:Helvetica,Arial,sans-serif;
  font-weight:300;
  font-size:28px;
  line-height:1.3;
  color:#3C3C3C;
  max-width:500px;
}
#home-stats{
  display:flex;
  gap:32px;
  padding:0 0 24px;
  align-items:flex-end;
  justify-content:center;
}
.home-stat{display:flex;flex-direction:column;align-items:center;gap:3px;}
.home-stat-num{font-size:42px;font-weight:700;letter-spacing:-2px;line-height:1;}
.home-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#ccc;}
.home-stat-num.teal{color:#087E8B;}
.home-stat-num.orange{color:#E8501A;}

/* ── CONTENT PANEL ── */
#content-panel{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;
  transform:translateY(100vh);
  transition:transform 0.42s cubic-bezier(.4,0,.2,1);
  background:#F5F5F5;
  padding-top:env(safe-area-inset-top,0);
  overflow:hidden;
}
#content-panel.open{
  transform:translateY(0);
}
/* inner scroll area */
#content-scroll{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* ── TAB BAR ── */
#tab-bar{
  display:flex;
  background:#fff;
  border-bottom:1px solid #e8e8e8;
  flex-shrink:0;
  width:100%;
}
.top-tab{
  flex:1;padding:14px 0;font-size:15px;
  cursor:pointer;border:none;background:none;
  color:#aaa;border-bottom:2px solid transparent;
  font-family:inherit;text-align:center;font-weight:500;
}
.top-tab.active{color:#3C3C3C;border-bottom-color:#E8501A;font-weight:700;}

/* ── PHASE NAV ── */
#phase-nav-row{background:#F5F5F5;border-bottom:1px solid #e8e8e8;flex-shrink:0;}
.phase-nav{display:flex;width:100%;background:transparent;}
.phase-btn{flex:1;padding:10px 0;font-size:13px;cursor:pointer;border:none;background:none;color:#aaa;border-bottom:2px solid transparent;font-family:inherit;text-align:center;font-weight:500;}
.phase-btn.active{color:#3C3C3C;border-bottom-color:#E8501A;font-weight:700;}

/* strava */
.strava-bar{display:flex;align-items:center;gap:10px;padding:7px 16px;background:#fff;border-bottom:1px solid #e8e8e8;font-size:13px;flex-shrink:0;}
.strava-btn{background:#E8501A;color:#fff;border:none;border-radius:5px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.strava-status{color:#bbb;font-size:13px;}
.strava-ok{color:#087E8B;font-weight:600;}
.strava-err{color:#E8501A;}

/* safe areas */
body{padding-bottom:0;}

@media(hover:none){
  .add-btn{width:32px;height:32px;}
  .phase-btn,.top-tab{min-height:44px;}
}

/* keep old header classes harmless */
.sticky-top{display:none;}
.header{display:none;}
.hdr-body,.hdr-logo,.hdr-quote-text,.hdr-countdown,.hdr-km-total{display:none;}

.phase-nav{display:flex;gap:0;background:transparent;width:100%;}
.phase-btn{flex:1;padding:10px 0;font-size:13px;cursor:pointer;border:none;background:none;color:#aaa;border-bottom:2px solid transparent;font-family:inherit;text-align:center;}
.phase-btn.active{color:#3C3C3C;border-bottom-color:#087E8B;font-weight:600;}
.phasebar-countdown{font-size:11px;font-weight:700;font-family:Helvetica,Arial,sans-serif;white-space:nowrap;letter-spacing:0.08em;}
.phasebar-countdown .cdnum{color:#087E8B;font-size:11px;}
.phasebar-countdown .cddtg{color:#ccc;font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:0.12em;}

.content{padding:20px 28px;max-width:960px;}
.phase-section{margin-bottom:36px;}
.phase-section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#ccc;margin-bottom:10px;}

/* phase-note — background style, no border, blends with page bg */
.phase-note{background:#F5F5F5;border:none;border-left:3px solid #087E8B;border-radius:0;font-size:15px;color:#777;line-height:1.65;margin-bottom:20px;position:relative;overflow:hidden;}
.phase-note-inner{padding:11px 16px;}
.phase-note-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}.phase-note-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#3C3C3C;}
.phase-note-toggle:hover .phase-note-title{color:#087E8B;}
.pn-arrow{font-size:10px;transition:transform 0.2s;display:inline-block;color:#bbb;}
.phase-note-toggle.open .pn-arrow{transform:rotate(90deg);}
.phase-note-body{display:none;}
.phase-note-body.open{display:block;}
.phase-note strong{color:#3C3C3C;font-weight:600;}
.phase-note-display{cursor:pointer;}
.phase-note-display:hover{color:#3C3C3C;}
.phase-note-edit{display:none;width:100%;font-size:13px;font-family:inherit;color:#555;line-height:1.65;border:none;outline:none;background:transparent;resize:none;min-height:60px;}
.phase-note-actions{margin-top:6px;display:flex;gap:6px;}

.week{background:#fff;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:6px;overflow:visible;}
.week.current-week{border-color:#087E8B;box-shadow:0 0 0 2px rgba(8,126,139,0.12);}
.week-hdr{padding:16px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-radius:8px;}
.week-hdr:hover{background:#fafafa;}
.week-title{font-size:17px;font-weight:600;color:#3C3C3C;}
.week-date{font-size:15px;color:#bbb;font-weight:400;margin-left:7px;}
.current-label{font-size:10px;font-weight:700;background:#087E8B;color:#fff;padding:2px 7px;border-radius:99px;margin-left:8px;vertical-align:middle;letter-spacing:0.03em;}
.km-badge{font-size:12px;font-weight:500;padding:3px 9px;border-radius:6px;}
.chevron{font-size:11px;color:#ccc;transition:transform 0.2s;display:inline-block;margin-left:8px;}
.chevron.open{transform:rotate(180deg);}
.week-body{display:none;border-top:1px solid #f0f0f0;border-radius:0 0 8px 8px;overflow:visible;}
.week-body.open{display:block;}

/* day row */
.day-row{display:grid;grid-template-columns:28px 46px 1fr auto;grid-template-rows:auto auto;gap:4px 8px;padding:12px 14px;border-bottom:1px solid #f8f8f8;position:relative;align-items:start;}.day-check{grid-column:1;grid-row:1/3;align-self:center;width:20px;height:20px;cursor:pointer;accent-color:#E8501A;}.day-row.done .day-main{opacity:0.4;}.day-row.done .tags-area{opacity:0.5;}
.day-row:last-child{border-bottom:none;}
.day-row.past{background:#fafafa;}
.day-label{font-size:15px;color:#ccc;font-weight:600;}
.tags-area{display:flex;flex-wrap:wrap;gap:6px 6px;align-items:center;row-gap:6px;}
.day-main{min-width:0;}
.day-text-display{font-size:16px;color:#3C3C3C;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s;word-break:break-word;line-height:1.4;display:inline;}
.day-text-display:hover{border-bottom-color:#ccc;}
.day-text-empty{color:transparent;font-style:italic;font-size:12px;display:inline;}
.day-row:hover .day-text-empty{color:#ccc;}
.day-text-input{font-size:16px;color:#3C3C3C;border:none;border-bottom:1px solid #aaa;background:transparent;outline:none;font-family:inherit;width:100%;resize:none;height:22px;line-height:22px;padding:0;overflow:hidden;display:block;}
.day-row.drag-target-day{background:#f0fafb;outline:2px dashed #087E8B;outline-offset:-2px;border-radius:4px;}
.missed-label{font-size:9px;font-weight:700;color:#E8501A;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;padding-right:6px;opacity:0.7;}
.day-row.missed-run .t-easy,.day-row.missed-run .t-workout,.day-row.missed-run .t-ml,.day-row.missed-run .t-long{background:#ebebeb !important;color:#bbb !important;}
.note-preview{font-size:11px;color:#bbb;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.3;}
.note-preview:hover{color:#777;}
.note-add{color:transparent;font-style:italic;transition:color 0.15s;}
.day-row:hover .note-add{color:#ccc;}
.note-add:hover{color:#999 !important;}

/* tags — run types: tonal teal; activity types: individual palette colours */
.tag{display:inline-block;padding:4px 11px;border-radius:4px;font-size:13px;font-weight:600;white-space:nowrap;vertical-align:middle;letter-spacing:0.01em;}
/* run types — tonal teal from light → dark */
.t-easy{background:#d4eef0;color:#087E8B;}
.t-ml{background:#8fc9cf;color:#fff;}
.t-workout{background:#087E8B;color:#fff;}
.t-long{background:#054f56;color:#d4eef0;}
/* strength */
.t-sa,.t-sb,.t-sl,.t-strength{background:#f0e0e8;color:#9c5072;}
/* activities */
.t-yoga{background:#f0e0e8;color:#C1839F;}
.t-hike{background:#ede0e8;color:#9c5072;}
.t-swim{background:#cce8f0;color:#087E8B;}
.t-pilates{background:#fde5dc;color:#E8501A;}
.t-padel{background:#fde8df;color:#b83c14;}
.t-rest{background:#ebebeb;color:#999;}
.t-race{background:#E8501A;color:#fff;}

/* km input */
.km-col{display:flex;align-items:center;justify-content:flex-end;}
.km-actual-input{width:50px;font-size:15px;border:none;border-bottom:1px solid #e0e0e0;background:transparent;outline:none;font-family:inherit;color:#3C3C3C;padding:1px 2px;text-align:right;}
.km-actual-input:focus{border-bottom-color:#087E8B;}
.km-actual-input::placeholder{color:#ddd;}

/* add button */
.add-btn{background:none;border:1px solid #e0e0e0;border-radius:99px;width:32px;height:32px;font-size:18px;line-height:1;cursor:pointer;color:#ccc;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.add-btn:hover{border-color:#087E8B;color:#087E8B;}

/* dropdown */
.add-dropdown{position:absolute;right:0;top:28px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:6px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.08);min-width:200px;}
.drop-section{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:0.06em;padding:4px 6px 2px;font-weight:700;}
.drop-pills{display:flex;flex-wrap:wrap;gap:4px;padding:0 4px 6px;}
.drop-pill{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.12s;}
.drop-pill:hover{filter:brightness(0.93);}
.dp-easy{background:#d4eef0;color:#087E8B;}
.dp-ml{background:#8fc9cf;color:#fff;}
.dp-workout{background:#087E8B;color:#fff;}
.dp-long{background:#054f56;color:#d4eef0;}
.dp-strength{background:#f0e0e8;color:#9c5072;}
.dp-yoga{background:#f0e0e8;color:#C1839F;}
.dp-hike{background:#ede0e8;color:#9c5072;}
.dp-swim{background:#cce8f0;color:#087E8B;}
.dp-pilates{background:#fde5dc;color:#E8501A;}
.dp-padel{background:#fde8df;color:#b83c14;}
.dp-rest{background:#ebebeb;color:#999;}
.drop-pill.selected{outline:2px solid currentColor;outline-offset:1px;}

.tag-removable{cursor:pointer;position:relative;}
.tag-removable:hover::after{content:'×';position:absolute;right:-2px;top:-4px;font-size:9px;background:#3C3C3C;color:#fff;border-radius:99px;width:12px;height:12px;display:flex;align-items:center;justify-content:center;line-height:12px;text-align:center;}

.note-panel{display:none;padding:0 14px 12px 14px;background:#fafafa;border-top:1px solid #f0f0f0;}
.note-panel.open{display:block;}
.note-panel textarea{width:100%;border:1px solid #e8e8e8;border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;color:#3C3C3C;resize:vertical;min-height:56px;background:#fff;outline:none;}
.note-panel textarea:focus{border-color:#087E8B;}
.note-panel textarea::placeholder{color:#ccc;}
.note-actions{display:flex;gap:8px;margin-top:5px;align-items:center;}
.btn-save{font-size:11px;color:#fff;background:#087E8B;border:none;border-radius:5px;padding:4px 12px;cursor:pointer;font-family:inherit;font-weight:600;}
.btn-save:hover{background:#065f69;}
.btn-discard{font-size:11px;color:#bbb;background:none;border:1px solid #e8e8e8;border-radius:5px;padding:3px 10px;cursor:pointer;font-family:inherit;}
.btn-discard:hover{color:#777;border-color:#aaa;}
.btn-delete-note{font-size:11px;color:#E8501A;background:none;border:none;cursor:pointer;font-family:inherit;margin-left:auto;}
.btn-delete-note:hover{color:#cc2a2f;}
.week-progress{font-size:11px;color:#ccc;margin-left:8px;}
.done-count{color:#087E8B;font-weight:600;}
.km-badge-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.km-actual-badge{font-size:11px;font-weight:600;color:#087E8B;}
.km-planned-line{font-size:10px;color:#ccc;}

/* strength tab */
.strength-page{padding:20px 28px;display:none;border-top:none;}
.str-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;width:100%;box-sizing:border-box;}
@container(max-width:900px){.str-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(max-width:960px){.str-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(max-width:500px){.str-grid{grid-template-columns:1fr;}}
.str-card{background:#fff;border:1px solid #e8e8e8;border-top:none;border-radius:8px;padding:14px 16px;min-height:200px;display:flex;flex-direction:column;}
.str-card.drag-over{border-color:#087E8B;background:#f0fafb;}
.str-card h2{font-size:13px;font-weight:700;margin-bottom:12px;color:#3C3C3C;letter-spacing:0.01em;}
.str-items{flex:1;}
.str-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:7px;cursor:grab;user-select:none;padding:3px 4px;border-radius:4px;transition:background 0.1s;}
.str-item:active{cursor:grabbing;}
.str-item.dragging{opacity:0.4;background:#f0fafb;}
.str-item.drag-target{border-top:2px solid #087E8B;}
.str-drag-handle{color:#ddd;font-size:12px;padding-top:1px;flex-shrink:0;cursor:grab;}
.str-item-text{font-size:13px;color:#3C3C3C;flex:1;line-height:1.45;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s;min-width:0;}
.str-item-text:hover{border-bottom-color:#ccc;}
.str-item-input{font-size:13px;color:#3C3C3C;border:none;border-bottom:1px solid #aaa;background:transparent;outline:none;font-family:inherit;width:100%;}
.str-del{background:none;border:none;cursor:pointer;color:#ddd;font-size:16px;line-height:1;padding:0 2px;transition:color 0.15s;flex-shrink:0;}
.str-del:hover{color:#E8501A;}
.str-card-footer{display:flex;justify-content:flex-end;margin-top:8px;}
.add-exercise-row{display:flex;gap:6px;margin-top:6px;}
.add-exercise-row input{flex:1;font-size:13px;border:1px solid #e8e8e8;border-radius:6px;padding:5px 10px;font-family:inherit;outline:none;color:#3C3C3C;}
.add-exercise-row input:focus{border-color:#087E8B;}
.add-exercise-row button{font-size:12px;background:#F5F5F5;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;color:#777;font-family:inherit;}
.add-exercise-row button:hover{background:#e8e8e8;}
.str-add-btn{background:none;border:1px solid #e0e0e0;border-radius:99px;width:22px;height:22px;font-size:16px;line-height:1;cursor:pointer;color:#ccc;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.str-add-btn:hover{border-color:#087E8B;color:#087E8B;}

/* strava */
.strava-bar{display:flex;align-items:center;gap:10px;padding:7px 28px;background:#fff;border-bottom:1px solid #e8e8e8;font-size:12px;}
.strava-btn{background:#E8501A;color:#fff;border:none;border-radius:5px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.strava-btn:hover{background:#e04448;}
.strava-status{color:#bbb;font-size:12px;}
.strava-ok{color:#087E8B;font-weight:600;}
.strava-err{color:#E8501A;}
/* PWA splash — always orange on load */
body{background:#E8501A;}
#home-screen,#content-panel{background:#fff;}
.splash-cover{
  position:fixed;inset:0;background:#E8501A;
  z-index:99999;
  display:flex;align-items:center;justify-content:center;
  animation:splashFade 0.5s 0.6s forwards;
}
.splash-cover img{height:100px;width:100px;object-fit:contain;border-radius:14px;}
@keyframes splashFade{to{opacity:0;pointer-events:none;}}
</style>
</head>
<body>

<!-- ── SPLASH ─────────────────────────────────────── -->
<div class="splash-cover"><img src="logo-2.png" alt="LMT"></div>

<!-- ── HOME SCREEN ────────────────────────────────── -->
<div id="home-screen">
  <div id="home-header"></div>
  <div id="home-quote-wrap">
    <div id="home-quote"></div>
  </div>
  <div id="home-stats">
    <div id="home-countdown"></div>
    <div id="home-km"></div>
  </div>
</div>

<!-- ── CONTENT PANEL (slides up over home) ────────── -->
<div id="content-panel">
  <!-- sticky tab bar -->
  <div id="tab-bar">
    <button class="top-tab active" id="tab-btn-plan" onclick="showTab('plan')">Plan</button>
    <button class="top-tab" id="tab-btn-strength" onclick="showTab('strength')">Strength</button>
  </div>
  <!-- strava + phase nav (sticky inside panel) -->
  <div id="strava-bar" class="strava-bar" style="display:none;"></div>
  <div id="phase-nav-row">
    <div class="phase-nav" id="phaseNav"></div>
  </div>
  <!-- scrollable content -->
  <div id="content-scroll">
    <div style="text-align:right;padding:2px 12px;background:#F5F5F5;"><span id="sync-status" style="font-size:10px;color:#ccc;font-family:Helvetica,Arial,sans-serif;"></span></div>
    <div id="tab-plan">
      <div class="content" id="content"></div>
    </div>
    <div id="tab-strength" class="strength-page">
      <div class="str-grid" id="strGrid"></div>
    </div>
  </div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────

const PHASES = [
{label:'Phase 1 — Base',shortLabel:'Base',
note:'<strong>Goal:</strong> Adapt to road load. Build mileage gradually. Keep strength consistent. Nearly all running at easy/conversational pace. Weeks 3–4 are travel — hike only.',
weeks:[
{n:1,date:'11 May',km:'45–50',days:[
  {d:'Mon',tag:'sa',t:'Strength A'},
  {d:'Tue',tag:'workout',t:'3×10 min threshold'},
  {d:'Wed',tag:'easy',t:'12 km easy'},
  {d:'Thu',tag:'ml',t:'14 km medium-long'},
  {d:'Fri',tag:'sb',t:'Strength B'},
  {d:'Sat',tag:'easy',t:'8 km easy'},
  {d:'Sun',tag:'long',t:'18 km long easy'},
]},
{n:2,date:'18 May',km:'50–55',days:[
  {d:'Mon',tag:'sa',t:'Strength A'},
  {d:'Tue',tag:'workout',t:'6×800m'},
  {d:'Wed',tag:'easy',t:'10 km easy'},
  {d:'Thu',tag:'ml',t:'14 km medium-long'},
  {d:'Fri',tag:'sb',t:'Strength B'},
  {d:'Sat',tag:'easy',t:'8 km easy'},
  {d:'Sun',tag:'long',t:'22 km long easy'},
]},
{n:3,date:'25 May',km:'8–10',travel:true,days:[
  {d:'Mon',tag:'hike',t:'Hike'},
  {d:'Tue',tag:'hike',t:'Hike'},

const WEEK_STARTS = {
  1: new Date('2026-05-11'),2:new Date('2026-05-18'),3:new Date('2026-05-25'),4:new Date('2026-06-01'),
  5:new Date('2026-06-08'),6:new Date('2026-06-15'),7:new Date('2026-06-22'),8:new Date('2026-06-29'),
  9:new Date('2026-07-06'),10:new Date('2026-07-13'),11:new Date('2026-07-20'),12:new Date('2026-07-27'),
  13:new Date('2026-08-03'),14:new Date('2026-08-10'),15:new Date('2026-08-17'),16:new Date('2026-08-24'),
  17:new Date('2026-08-31'),18:new Date('2026-09-07'),19:new Date('2026-09-14'),20:new Date('2026-09-21'),
  21:new Date('2026-09-28'),22:new Date('2026-10-05')
};

function getCurrentWeek(){
  const now = new Date();
  let cur = null;
  const wns = Object.keys(WEEK_STARTS).map(Number).sort((a,b)=>a-b);
  for(let i=0;i<wns.length;i++){
    const start = WEEK_STARTS[wns[i]];
    const end = i+1<wns.length ? WEEK_STARTS[wns[i+1]] : new Date('2026-10-12');
    if(now>=start && now<end){ cur=wns[i]; break; }
  }
  return cur;
}

let syncTimer = null;
let syncStatus = 'idle'; // idle | saving | saved | error | loading

function setSyncStatus(s, msg){
  syncStatus = s;
  const el = document.getElementById('sync-status');
  if(!el) return;
  const icons = {idle:'', saving:'↑', saved:'✓', error:'!', loading:'↓'};
  const colors = {idle:'#ccc', saving:'#aaa', saved:'#087E8B', error:'#E8501A', loading:'#aaa'};
  el.textContent = icons[s] + (msg ? ' '+msg : '');
  el.style.color = colors[s];
}

async function pushToSupabase(){
  setSyncStatus('saving');
  try{
    const res = await fetch(`${SB_URL}/rest/v1/training_log?id=eq.main`, {
      method:'PATCH',
      headers:{...SB_HEADERS, 'Content-Type':'application/json'},
      body: JSON.stringify({data: state, updated_at: new Date().toISOString()}),
    });
    if(!res.ok) throw new Error(res.status);
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('idle'), 2000);
  } catch(e){
    setSyncStatus('error','sync failed');
    setTimeout(()=>setSyncStatus('idle'), 4000);
  }
}

async function pullFromSupabase(){
  setSyncStatus('loading');
  try{
    const res = await fetch(`${SB_URL}/rest/v1/training_log?id=eq.main&select=data,updated_at`, {
      headers: {'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`},
    });
    if(!res.ok) throw new Error(res.status);
    const rows = await res.json();
    if(!rows.length) { setSyncStatus('idle'); return false; }

    const remote = rows[0].data || {};
    const remoteTime = new Date(rows[0].updated_at||0).getTime();
    const localTime = state._savedAt || 0;

    if(remoteTime > localTime){
      // Remote is newer — merge into state
      state = {...state, ...remote};
      localStorage.setItem('lm26_v5', JSON.stringify(state));
      setSyncStatus('idle');
      return true; // caller should re-render
    }
    setSyncStatus('idle');
    return false;
  } catch(e){
    setSyncStatus('error','offline');
    setTimeout(()=>setSyncStatus('idle'), 3000);
    return false;
  }
}

function save(){
  state._savedAt = Date.now();
  try{ localStorage.setItem('lm26_v5', JSON.stringify(state)); } catch(e){}
  // Debounce remote push — wait 1.5s after last change
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToSupabase, 1500);
}

  const cs = document.getElementById('content-scroll');

      closeContentPanel();

  }, {passive:true});
}

let dragSrc = null; // {key, i}

function strDragStart(evt, key, i){
  dragSrc = {key, i};
  evt.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{ const el=document.getElementById(`si-${key}-${i}`); if(el) el.classList.add('dragging'); }, 0);
}
function strDragEnd(evt){
  document.querySelectorAll('.str-item').forEach(el=>el.classList.remove('dragging','drag-target'));
  document.querySelectorAll('.str-card').forEach(el=>el.classList.remove('drag-over'));
}
function strDragOver(evt, key){
  evt.preventDefault();
  evt.dataTransfer.dropEffect='move';
  const card=document.getElementById(`card-${key}`);
  if(card) card.classList.add('drag-over');
}
function strDragLeave(evt, key){
  const card=document.getElementById(`card-${key}`);
  if(card) card.classList.remove('drag-over');
}
function strItemOver(evt, key, i){
  evt.preventDefault();
  document.querySelectorAll('.str-item').forEach(el=>el.classList.remove('drag-target'));
  const el=document.getElementById(`si-${key}-${i}`);
  if(el) el.classList.add('drag-target');
}
function strDrop(evt, destKey){
  evt.preventDefault();
  if(!dragSrc) return;
  const {key:srcKey, i:srcIdx} = dragSrc;
  dragSrc = null;

  // find drop position — which item was targeted?
  const items = document.getElementById(`card-${destKey}`).querySelectorAll('.str-item.drag-target');
  let destIdx = (state[destKey]||[]).length; // default: end of list
  if(items.length){
    const m = items[0].id.match(/-(\d+)$/);
    if(m) destIdx = parseInt(m[1]);
  }

  const srcList = [...(state[srcKey]||[])];
  const destList = srcKey===destKey ? srcList : [...(state[destKey]||[])];

  const [moved] = srcList.splice(srcIdx, 1);

  if(srcKey === destKey){
    srcList.splice(destIdx > srcIdx ? destIdx-1 : destIdx, 0, moved);
    state[srcKey] = srcList;
  } else {
    state[srcKey] = srcList;
    destList.splice(destIdx, 0, moved);
    state[destKey] = destList;
  }

  save();
  renderStrength();
}

function startStrEdit(key, i){
  document.getElementById(`str-text-${key}-${i}`).style.display='none';
  const inp = document.getElementById(`str-inp-${key}-${i}`);
  inp.style.display='inline-block'; inp.focus(); inp.select();
}
function finishStrEdit(key, i){
  const inp = document.getElementById(`str-inp-${key}-${i}`);
  const txt = document.getElementById(`str-text-${key}-${i}`);
  if(!inp||!txt) return;
  state[key][i] = inp.value; save();
  txt.textContent = inp.value;
  inp.style.display='none'; txt.style.display='inline';
}
function strEditKey(evt, key, i){ if(evt.key==='Enter'||evt.key==='Escape') finishStrEdit(key,i); }
function delExercise(key, i){ state[key].splice(i,1); save(); renderStrength(); }
function showAddRow(key){
  const row=document.getElementById(`add-row-${key}`);
  const btn=document.getElementById(`add-btn-${key}`);
  if(row){ row.style.display='flex'; }
  if(btn){ btn.style.display='none'; }
  const inp = document.getElementById(`new-ex-${key}`);
  if(inp){
    setTimeout(()=>{ inp.focus(); }, 30);
    inp.onblur = ()=>{ setTimeout(()=>hideAddRow(key), 160); };
  }
}
function hideAddRow(key){
  const row=document.getElementById(`add-row-${key}`);
  const btn=document.getElementById(`add-btn-${key}`);
  if(row){ row.style.display='none'; const inp=document.getElementById(`new-ex-${key}`); if(inp) inp.value=''; }
  if(btn){ btn.style.display='inline-block'; }
}
function addExercise(key){
  const inp = document.getElementById(`new-ex-${key}`);
  if(!inp||!inp.value.trim()) return;
  state[key].push(inp.value.trim()); save();
  renderStrength();
}
function resetStrength(key){
  const map = {strA:'A',strAcore:'Acore',strB:'B',strPC:'PC'};
  state[key] = [...DEFAULT_STR[map[key]]]; save(); renderStrength();
}

// ── UNIFIED TEXT (replaces title + note) ─────────────────────────────────────
function startTextEdit(wn, di){
  const el = document.getElementById(`dt-${wn}-${di}`);
  if(!el || el.tagName === 'INPUT') return;
  const k=dk(wn,di); if(!state[k]) state[k]={};
  const text = state[k].text != null ? state[k].text : (state[k].title != null ? state[k].title : (findWeek(wn)?.days[di]?.t || ''));
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'day-text-input';
  inp.id = `dt-${wn}-${di}`;
  inp.value = text;
  inp.onblur = ()=>saveText(wn,di);
  inp.onkeydown = (e)=>{ if(e.key==='Enter'||e.key==='Escape'){ e.preventDefault(); saveText(wn,di); } };
  inp.onclick = (e)=>e.stopPropagation();
  el.replaceWith(inp);
  inp.focus();
  inp.selectionStart = inp.selectionEnd = inp.value.length;
}

// ── PILL DRAG
function saveText(wn, di){
  const inp = document.getElementById(`dt-${wn}-${di}`);
  if(!inp || inp.tagName !== 'INPUT') return;
  const k=dk(wn,di); if(!state[k]) state[k]={};
  const val = inp.value;
  state[k].text = val;
  delete state[k].textEditing;
  save();
  const span = document.createElement('span');
  if(val === ''){
    span.className = 'day-text-display day-text-empty';
    span.textContent = '+ note';
  } else {
    span.className = 'day-text-display';
    span.textContent = val;
  }
  span.id = `dt-${wn}-${di}`;
  span.onclick = (e)=>{ e.stopPropagation(); startTextEdit(wn,di); };
  inp.replaceWith(span);
}

function textKey(evt, wn, di){
  if(evt.key==='Enter'||evt.key==='Escape'){ evt.preventDefault(); saveText(wn,di); }
}

// ── PILL DRAG (reorder within day OR move to another day) ────────────────────
let pillDrag = null; // {wn, di, idx, id, isPlanned}

function pillDragStart(evt, wn, di, idx){
  const k=dk(wn,di);
  const id = (state[k]?.added||[])[idx];
  pillDrag = {wn, di, idx, id, isPlanned:false};
  evt.dataTransfer.effectAllowed = 'move';
  evt.dataTransfer.setData('text/plain','pill');
  setTimeout(()=>evt.currentTarget.style.opacity='0.4', 0);
}

function pillDragStartPlanned(evt, wn, di){
  const w=findWeek(wn); const tag=w?.days[di]?.tag;
  pillDrag = {wn, di, idx:-1, id:tag, isPlanned:true};
  evt.dataTransfer.effectAllowed = 'move';
  evt.dataTransfer.setData('text/plain','pill');
  setTimeout(()=>evt.currentTarget.style.opacity='0.4', 0);
}

function pillDragEnd(evt){ evt.currentTarget.style.opacity=''; }

function pillDragOver(evt, wn, di, idx){
  if(!pillDrag) return;
  evt.preventDefault();
  evt.stopPropagation();
  evt.currentTarget.style.outline='2px solid #087E8B';
}
function pillDragLeave(evt){ evt.currentTarget.style.outline=''; }

function pillDrop(evt, wn, di, idx){
  evt.currentTarget.style.outline='';
  evt.stopPropagation();
  if(!pillDrag) return;
  const src = pillDrag; pillDrag=null;

  if(src.isPlanned){
    // can't really move planned tag, ignore
    return;
  }

  const srcK=dk(src.wn,src.di); const dstK=dk(wn,di);
  if(!state[srcK]) state[srcK]={};

  // same day reorder
  if(src.wn===wn && src.di===di){
    const arr=[...(state[srcK].added||[])];
    const [m]=arr.splice(src.idx,1);
    arr.splice(idx,0,m);
    state[srcK].added=arr; save();
  } else {
    // move to another day: remove from src, add to dest at position idx
    const srcArr=[...(state[srcK].added||[])];
    srcArr.splice(src.idx,1);
    state[srcK].added=srcArr;
    if(!state[dstK]) state[dstK]={};
    const dstArr=[...(state[dstK].added||[])];
    dstArr.splice(idx,0,src.id);
    state[dstK].added=dstArr;
    save();
    // refresh source day tags
    const srcTagsEl=document.getElementById(`tags-${src.wn}-${src.di}`);
    if(srcTagsEl){
      const sw=findWeek(src.wn); const sd=sw?.days[src.di];
      if(sd) srcTagsEl.innerHTML=plannedTagHtml(sd.tag,src.wn,src.di,!!state[srcK].plannedHidden)+addedTagsHtml(state[srcK],src.wn,src.di);
    }
    refreshKmCol(src.wn,src.di);
  }
  // refresh dest day tags
  const dstTagsEl=document.getElementById(`tags-${wn}-${di}`);
  if(dstTagsEl){
    const dw=findWeek(wn); const dd=dw?.days[di];
    if(dd) dstTagsEl.innerHTML=plannedTagHtml(dd.tag,wn,di,!!state[dstK].plannedHidden)+addedTagsHtml(state[dstK],wn,di);
  }
  refreshKmCol(wn,di);
}

// day-level drag-over (for when dragging over empty parts of a day row)
function dayDragOver(evt, wn, di){
  if(!pillDrag || (pillDrag.wn===wn && pillDrag.di===di)) return;
  evt.preventDefault();
  document.getElementById(`dr-${wn}-${di}`)?.classList.add('drag-target-day');
}
function dayDragLeave(evt, wn, di){
  document.getElementById(`dr-${wn}-${di}`)?.classList.remove('drag-target-day');
}
function dayDrop(evt, wn, di){
  document.getElementById(`dr-${wn}-${di}`)?.classList.remove('drag-target-day');
  if(!pillDrag || pillDrag.wn===wn && pillDrag.di===di) return;
  evt.preventDefault();
  // drop at end of added list
  const src=pillDrag; pillDrag=null;
  if(src.isPlanned) return;
  const srcK=dk(src.wn,src.di); const dstK=dk(wn,di);
  if(!state[srcK]) state[srcK]={};
  if(!state[dstK]) state[dstK]={};
  const srcArr=[...(state[srcK].added||[])];
  srcArr.splice(src.idx,1);
  state[srcK].added=srcArr;
  const dstArr=[...(state[dstK].added||[])];
  dstArr.push(src.id);
  state[dstK].added=dstArr;
  save();
  // refresh both days
  [src,{wn,di}].forEach(({wn:w2,di:d2})=>{
    const tagsEl=document.getElementById(`tags-${w2}-${d2}`);
    if(tagsEl){
      const pw=findWeek(w2); const pd=pw?.days[d2];
      const k2=dk(w2,d2);
      if(pd) tagsEl.innerHTML=plannedTagHtml(pd.tag,w2,d2,!!state[k2]?.plannedHidden)+addedTagsHtml(state[k2]||{},w2,d2);
    }
    refreshKmCol(w2,d2);
  });
}

// ── PLAN ─────────────────────────────────────────────────────────────────────
function addedTagsHtml(s, wn, di){
  const added = s.added || [];
  return added.map((id, idx) =>
    `<span class="tag ${ADDED_CLS[id]} tag-removable"
      draggable="true"
      ondragstart="pillDragStart(event,${wn},${di},${idx})"
      ondragend="pillDragEnd(event)"
      ondragover="pillDragOver(event,${wn},${di},${idx})"
      ondragleave="pillDragLeave(event)"
      ondrop="pillDrop(event,${wn},${di},${idx})"
      onclick="removeAdded(event,${wn},${di},'${id}')"
      title="Drag to move · click to remove">${ADDED_LABEL[id]}</span>`
  ).join('');
}

function plannedTagHtml(tag, wn, di, hidden){
  const cls = TAG_CLS[tag] || '';
  const label = TAG_LABEL[tag] || tag;
  if(hidden) return '';
  return `<span class="tag ${cls} tag-removable" id="ptag-${wn}-${di}" onclick="togglePlannedTag(${wn},${di})" title="Click to remove">${label}</span>`;
}

function renderPhase(){
  const currentWeek = getCurrentWeek();
  let fullHtml = '';

  PHASES.forEach((p, phaseIdx) => {
    const noteKey = `phaseNote_${phaseIdx}`;
    const noteText = state[noteKey] != null ? state[noteKey] : p.note;
    const noteEditing = !!state[`phaseNoteEditing_${phaseIdx}`];
    const noteOpen = !!state[`phaseNoteOpen_${phaseIdx}`];
    let phaseNoteHtml;
    if(noteEditing){
      phaseNoteHtml = `<div class="phase-note">
        <div class="phase-note-toggle open" onclick="togglePhaseNote(${phaseIdx})">
          <span class="phase-note-title">${p.label}</span>
          <span class="pn-arrow">▶</span>
        </div>
        <div class="phase-note-body open">
          <div class="phase-note-inner">
            <textarea class="phase-note-edit" id="phase-note-ta-${phaseIdx}" style="display:block;">${esc(noteText)}</textarea>
            <div class="phase-note-actions">
              <button class="btn-save" onclick="savePhaseNote(${phaseIdx})">Save</button>
              <button class="btn-discard" onclick="cancelPhaseNote(${phaseIdx})">Cancel</button>
            </div>
          </div>
        </div>
      </div>`;
    } else {
      phaseNoteHtml = `<div class="phase-note">
        <div class="phase-note-toggle${noteOpen?' open':''}" onclick="togglePhaseNote(${phaseIdx})">
          <span class="phase-note-title">${p.label}</span>
          <span class="pn-arrow">▶</span>
        </div>
        <div class="phase-note-body${noteOpen?' open':''}">
          <div class="phase-note-inner">
            <span class="phase-note-display" onclick="editPhaseNote(${phaseIdx})" title="Click to edit">${noteText}</span>
          </div>
        </div>
      </div>`;
    }

    fullHtml += `<div class="phase-section" id="phase-section-${phaseIdx}">
      ${phaseNoteHtml}`;

    p.weeks.forEach(w => {
      const wopen = !!openWeeks[w.n];
      const RUN_TYPES_P = ['easy','workout','ml','long'];
      // total = planned run days only (fixed)
      const totalRuns = w.days.filter(d => RUN_TYPES_P.includes(d.tag)).length;
      // done = any run day (planned or added pill) with km logged
      const doneRuns = w.days.filter((d,i) => {
        const s2 = state[dk(w.n,i)] || {};
        const isPlannedRun = RUN_TYPES_P.includes(d.tag);
        const hasAddedRun = (s2.added||[]).some(id => RUN_TYPES_P.includes(id));
        if(!isPlannedRun && !hasAddedRun) return false;
        return parseFloat(s2.kmActual) > 0;
      }).length;
      const isCurrent = w.n === currentWeek;
      const wlabel = w.travel ? `W${w.n} — Travel` : w.cutback ? `W${w.n} — Cutback` : `W${w.n}`;
      const curBadge = isCurrent ? `<span class="current-label">Current</span>` : '';
      const prog = totalRuns > 0 && doneRuns > 0
        ? `<span class="week-progress" id="prog-${w.n}"><span class="done-count">${doneRuns}</span>/${totalRuns} runs</span>`
        : `<span class="week-progress" id="prog-${w.n}"></span>`;

      let actualTotal = 0;
      w.days.forEach((_,i) => { const v = parseFloat((state[dk(w.n,i)]||{}).kmActual); if(!isNaN(v)) actualTotal += v; });
      const hasActual = actualTotal > 0;

      let badgeHtml;
      if(w.km === 'Race'){
        badgeHtml = `<span class="km-badge" style="background:#faeeda;color:#633806;">Race</span>`;
      } else {
        const plannedLine = `<span class="km-planned-line">${w.km} km</span>`;
        const actualLine = hasActual ? `<span class="km-actual-badge">${actualTotal % 1 === 0 ? actualTotal : actualTotal.toFixed(1)} km</span>` : '';
        badgeHtml = `<div class="km-badge-wrap">${actualLine}${plannedLine}</div>`;
      }

      fullHtml += `<div class="week${isCurrent?' current-week':''}" id="week-${w.n}">
        <div class="week-hdr" onclick="toggleWeek(${w.n})">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">
            <span class="week-title">${wlabel}</span><span class="week-date">${w.date}</span>${curBadge}${prog}
          </div>
          <div style="display:flex;align-items:center;gap:8px;">${badgeHtml}<span class="chevron${wopen?' open':''}">▼</span></div>
        </div>
        <div class="week-body${wopen?' open':''}">`;

      w.days.forEach((day, di) => {
        const k = dk(w.n, di);
        const s = state[k] || {};
        // unified text: use s.text (new field), fall back to s.title, then day default
        const text = s.text != null ? s.text : (s.title != null ? s.title : day.t);
        const isDefault = text === day.t;
        const isEmpty = text === '';
        const plannedHidden = !!s.plannedHidden;
        const dropOpen = openDropdown === `${w.n}-${di}`;
        const kmActual = s.kmActual || '';
        const textEditing = !!s.textEditing;

        const dayOfWeek = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(day.d);
        const weekStart = WEEK_STARTS[w.n];
        let dayDate = null;
        if(weekStart){ dayDate = new Date(weekStart); dayDate.setDate(dayDate.getDate() + dayOfWeek); }
        const isPast = dayDate ? dayDate < new Date(new Date().toDateString()) : false;

        const RUN_TYPES = ['easy','workout','ml','long'];
        const plannedIsRun = !plannedHidden && RUN_TYPES.includes(day.tag);
        const addedHasRun = (s.added||[]).some(id => RUN_TYPES.includes(id));
        const showKm = plannedIsRun || addedHasRun;
        const isMissedRun = isPast && (plannedIsRun || addedHasRun) && !(parseFloat(kmActual) > 0);

        const kmColHtml = showKm
          ? `<div class="km-col">${isMissedRun ? '<span class="missed-label">missed</span>' : ''}<input class="km-actual-input" id="km-${w.n}-${di}" type="text" inputmode="decimal" placeholder="km" value="${escA(String(kmActual))}" onchange="saveKm(${w.n},${di},this.value)" onclick="event.stopPropagation()"></div>`
          : `<div class="km-col"></div>`;

        // text display: always render as span; editing handled by DOM swap in startTextEdit
        let textDisplay;
        if(isEmpty){
          textDisplay = `<span class="day-text-display day-text-empty" id="dt-${w.n}-${di}" onclick="startTextEdit(${w.n},${di})">+ note</span>`;
        } else {
          textDisplay = `<span class="day-text-display" id="dt-${w.n}-${di}" onclick="startTextEdit(${w.n},${di})">${esc(text)}</span>`;
        }

        const isDone = !!s.done;
        fullHtml += `<div class="day-row${isPast?' past':''}${isMissedRun?' missed-run':''}${isDone?' done':''}" id="dr-${w.n}-${di}"
          ondragover="dayDragOver(event,${w.n},${di})"
          ondragleave="dayDragLeave(event,${w.n},${di})"
          ondrop="dayDrop(event,${w.n},${di})">
          <input type="checkbox" class="day-check" ${isDone?'checked':''} onchange="toggleDone(${w.n},${di},this)" onclick="event.stopPropagation()">
          <div class="day-label" style="grid-row:1;padding-top:2px;">${day.d}</div>
          <div class="tags-area" id="tags-${w.n}-${di}" style="grid-column:3;grid-row:1;">
            ${plannedTagHtml(day.tag, w.n, di, plannedHidden)}
            ${addedTagsHtml(s, w.n, di)}
          </div>
          <div class="day-top-right" style="grid-column:4;grid-row:1;position:relative;display:flex;align-items:flex-start;gap:6px;justify-content:flex-end;">
            ${showKm ? `<div class="km-col">${isMissedRun ? '<span class="missed-label">MISSED</span>' : ''}<input class="km-actual-input" id="km-${w.n}-${di}" type="text" inputmode="decimal" placeholder="km" value="${escA(String(kmActual))}" onchange="saveKm(${w.n},${di},this.value)" onclick="event.stopPropagation()"></div>` : ''}
            <button class="add-btn" onclick="toggleDropdown(event,${w.n},${di})" title="Add activity">+</button>
            ${dropOpen ? buildDropdown(w.n, di, s) : ''}
          </div>
          <div class="day-main" style="grid-column:2/5;grid-row:2;">
            ${textDisplay}
          </div>
        </div>`;
      });

      fullHtml += `</div></div>`;
    });

    fullHtml += `</div>`; // close phase-section
  });

  document.getElementById('content').innerHTML = fullHtml;

  // auto-focus any open phase note textarea
  PHASES.forEach((_,pi) => {
    if(state[`phaseNoteEditing_${pi}`]){
      const ta = document.getElementById(`phase-note-ta-${pi}`);
      if(ta){ ta.style.height=ta.scrollHeight+'px'; setTimeout(()=>ta.focus(), 30); }
    }
  });
}

function buildDropdown(wn, di, s){
  const added = s.added || [];
  let h = `<div class="add-dropdown" id="drop-${wn}-${di}" onclick="event.stopPropagation()">`;
  EXTRA_OPTIONS.forEach(section => {
    h += `<div class="drop-section">${section.section}</div><div class="drop-pills">`;
    section.items.forEach(item => {
      const sel = added.includes(item.id);
      h += `<span class="drop-pill ${item.cls}${sel?' selected':''}" onclick="toggleAdded(${wn},${di},'${item.id}')">${item.label}</span>`;
    });
    h += `</div>`;
  });
  h += `</div>`;
  return h;
}

function renderNav(){
  document.getElementById('phaseNav').innerHTML = PHASES.map((p,i)=>
    `<button class="phase-btn${i===activePhase?' active':''}" onclick="scrollToPhase(${i})">${p.shortLabel}</button>`
  ).join('');
}

function scrollToPhase(i){
  activePhase = i;
  renderNav();
  const el = document.getElementById(`phase-section-${i}`);
  if(el){
    const navH = document.querySelector('.sticky-top')?.offsetHeight || 100;
    const y = el.getBoundingClientRect().top + window.scrollY - navH - 8;
    window.scrollTo({top:y, behavior:'smooth'});
  }
}

function setPhase(i){ scrollToPhase(i); }
function toggleWeek(n){ openWeeks[n]=!openWeeks[n]; openDropdown=null; renderPhase(); }

// scroll-spy: watch phase sections and update active nav btn
function initScrollSpy(){
  function updateActivPhase(){
    const navH = document.querySelector('.sticky-top')?.offsetHeight || 100;
    const scrollEl2 = document.getElementById('content-scroll');
  const scrollY = (scrollEl2 ? scrollEl2.scrollTop : window.scrollY) + navH + 20;
    let current = 0;
    PHASES.forEach((_,i)=>{
      const el = document.getElementById(`phase-section-${i}`);
      if(el && el.getBoundingClientRect().top + window.scrollY <= scrollY) current = i;
    });
    if(current !== activePhase){
      activePhase = current;
      document.querySelectorAll('.phase-btn').forEach((b,i)=>b.classList.toggle('active',i===activePhase));
    }
  }
  const scrollEl = document.getElementById('content-scroll') || window;
  scrollEl.addEventListener('scroll', updateActivPhase, {passive:true});
  updateActivPhase();
}

function updateProgress(wn){
  let w = null;
  for(const p of PHASES){ w = p.weeks.find(x=>x.n===wn); if(w) break; }
  if(!w) return;
  const RUN_TYPES_P = ['easy','workout','ml','long'];
  const totalRuns = w.days.filter(d => RUN_TYPES_P.includes(d.tag)).length;
  const doneRuns = w.days.filter((d,i)=>{
    const s2 = state[dk(wn,i)] || {};
    const isPlannedRun = RUN_TYPES_P.includes(d.tag);
    const hasAddedRun = (s2.added||[]).some(id=>RUN_TYPES_P.includes(id));
    return (isPlannedRun||hasAddedRun) && parseFloat(s2.kmActual) > 0;
  }).length;
  const el=document.getElementById(`prog-${wn}`);
  if(el) el.innerHTML = totalRuns>0&&doneRuns>0 ? `<span class="done-count">${doneRuns}</span>/${totalRuns} runs` : '';
}

function toggleDone(wn,di,el){
  const k=dk(wn,di); if(!state[k]) state[k]={};
  state[k].done=el.checked; save();
  document.getElementById(`dr-${wn}-${di}`)?.classList.toggle('done',el.checked);
  const main=document.querySelector(`#dr-${wn}-${di} .day-main`);
  if(main) main.style.opacity=el.checked?'0.45':'1';
  updateProgress(wn);
}

function findWeek(wn){ for(const p of PHASES){ const w=p.weeks.find(x=>x.n===wn); if(w) return w; } return null; }

function refreshKmCol(wn, di){
  // With the new 2-row layout, just re-render the whole day row
  const w=findWeek(wn); if(!w) return;
  const day=w.days[di]; if(!day) return;
  const k=dk(wn,di); const s=state[k]||{};
  const RUN_TYPES=['easy','workout','ml','long'];
  const plannedIsRun = !s.plannedHidden && RUN_TYPES.includes(day.tag);
  const addedHasRun = (s.added||[]).some(id=>RUN_TYPES.includes(id));
  const showKm = plannedIsRun || addedHasRun;
  const row = document.getElementById(`dr-${wn}-${di}`);
  if(!row) return;
  const dayOfWeek = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(day.d);
  const weekStart = WEEK_STARTS[wn];
  let dayDate = null;
  if(weekStart){ dayDate = new Date(weekStart); dayDate.setDate(dayDate.getDate()+dayOfWeek); }
  const isPast = dayDate ? dayDate < new Date(new Date().toDateString()) : false;
  const kmActual = s.kmActual||'';
  const isMissed = isPast && showKm && !(parseFloat(kmActual)>0);
  row.classList.toggle('missed-run', isMissed);

  // Update the top-right cell (grid-column:3, grid-row:1) which has km+add-btn
  const topRight = row.querySelector('.day-top-right');
  if(!topRight) return;
  const dropOpen = openDropdown === `${wn}-${di}`;
  const missedHtml = isMissed ? `<span class="missed-label">MISSED</span>` : '';
  const kmHtml = showKm ? `<div class="km-col">${missedHtml}<input class="km-actual-input" id="km-${wn}-${di}" type="text" inputmode="decimal" placeholder="km" value="${escA(String(kmActual))}" onchange="saveKm(${wn},${di},this.value)" onclick="event.stopPropagation()"></div>` : '';
  topRight.innerHTML = `${kmHtml}<button class="add-btn" onclick="toggleDropdown(event,${wn},${di})" title="Add activity">+</button>${dropOpen ? buildDropdown(wn,di,s) : ''}`;
}

function togglePlannedTag(wn, di){
  const k=dk(wn,di); if(!state[k]) state[k]={};
  state[k].plannedHidden = !state[k].plannedHidden; save();
  openDropdown = null; // close any open dropdown
  const tagsEl=document.getElementById(`tags-${wn}-${di}`);
  if(tagsEl){
    const w=findWeek(wn); const day=w?w.days[di]:null; if(!day) return;
    const s=state[k];
    tagsEl.innerHTML=plannedTagHtml(day.tag,wn,di,s.plannedHidden)+addedTagsHtml(s,wn,di);
  }
  // refreshKmCol handles add-btn restore
  refreshKmCol(wn,di);
}

function toggleDropdown(evt,wn,di){
  evt.stopPropagation();
  const key=`${wn}-${di}`;
  openDropdown = openDropdown===key ? null : key;
  renderPhase();
}

function toggleAdded(wn,di,id){
  const k=dk(wn,di); if(!state[k]) state[k]={};
  if(!state[k].added) state[k].added=[];
  const idx=state[k].added.indexOf(id);
  if(idx>=0) state[k].added.splice(idx,1);
  else state[k].added.push(id);
  save();
  openDropdown = null; // close dropdown after selection
  const tagsEl=document.getElementById(`tags-${wn}-${di}`);
  if(tagsEl){
    const w=findWeek(wn); const day=w?w.days[di]:null; if(!day) return;
    const s=state[k];
    tagsEl.innerHTML=plannedTagHtml(day.tag,wn,di,!!s.plannedHidden)+addedTagsHtml(s,wn,di);
  }
  // close the dropdown in DOM
  const drop=document.getElementById(`drop-${wn}-${di}`);
  if(drop) drop.remove();
  // restore add-btn if it got clobbered
  // refreshKmCol handles add-btn restore
  refreshKmCol(wn,di);
  updateProgress(wn);
}

function removeAdded(evt,wn,di,id){
  evt.stopPropagation();
  const k=dk(wn,di); if(!state[k]) return;
  state[k].added=(state[k].added||[]).filter(x=>x!==id); save();
  openDropdown = null;
  const tagsEl=document.getElementById(`tags-${wn}-${di}`);
  if(tagsEl){
    const w=findWeek(wn); const day=w?w.days[di]:null; if(!day) return;
    const s=state[k];
    tagsEl.innerHTML=plannedTagHtml(day.tag,wn,di,!!s.plannedHidden)+addedTagsHtml(s,wn,di);
  }
  // refreshKmCol handles add-btn restore
  refreshKmCol(wn,di);
  updateProgress(wn);
}

function saveKm(wn, di, val){
  const k=dk(wn,di); if(!state[k]) state[k]={};
  const v = parseFloat(val);
  state[k].kmActual = isNaN(v)||v<=0 ? '' : v;
  save();
  const w=findWeek(wn); if(!w) return;
  let actualTotal=0;
  w.days.forEach((_,i)=>{ const v2=parseFloat((state[dk(wn,i)]||{}).kmActual); if(!isNaN(v2)) actualTotal+=v2; });
  const hasActual=actualTotal>0;
  const wrap=document.querySelector(`#week-${wn} .km-badge-wrap`);
  if(wrap){
    const plannedLine=`<span class="km-planned-line">${w.km} km</span>`;
    const actualLine=hasActual?`<span class="km-actual-badge">${actualTotal%1===0?actualTotal:actualTotal.toFixed(1)} km</span>`:'';
    wrap.innerHTML=actualLine+plannedLine;
  }
  refreshKmCol(wn,di); // updates missed-run class
  updateProgress(wn);
  renderKmTotal();
}

}

}

}

// ── STRAVA ──────────────────────────────────────────────────────────────────
const STRAVA_CLIENT_ID = '145535';
const STRAVA_CLIENT_SECRET = '767368c2ff166a9e4707230699139b1dbe254953';
const STRAVA_REDIRECT = window.location.href.split('?')[0].split('#')[0];

function stravaAuthUrl(){
  return `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(STRAVA_REDIRECT)}&approval_prompt=auto&scope=activity:read_all`;
}
async function stravaExchangeCode(code){
  const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:STRAVA_CLIENT_ID,client_secret:STRAVA_CLIENT_SECRET,code,grant_type:'authorization_code'})});
  return r.json();
}
async function stravaRefreshToken(rt){
  const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:STRAVA_CLIENT_ID,client_secret:STRAVA_CLIENT_SECRET,refresh_token:rt,grant_type:'refresh_token'})});
  return r.json();
}
async function getStravaToken(){
  let tok=state.stravaTok; if(!tok) return null;
  if(Date.now()/1000>tok.expires_at-60){ const f=await stravaRefreshToken(tok.refresh_token); if(!f.access_token) return null; state.stravaTok=f; save(); tok=f; }
  return tok.access_token;
}
async function stravaSync(){
  renderStravaBar('syncing');
  const token=await getStravaToken(); if(!token){ renderStravaBar('disconnected'); return; }
  try{
    const after=Math.floor(new Date('2026-05-11').getTime()/1000);
    const before=Math.floor(new Date('2026-10-11').getTime()/1000);
    let page=1,all=[];
    while(true){ const r=await fetch(`https://www.strava.com/api/v3/athlete/activities?after=${after}&before=${before}&per_page=100&page=${page}`,{headers:{Authorization:`Bearer ${token}`}}); const acts=await r.json(); if(!Array.isArray(acts)||acts.length===0) break; all=all.concat(acts); page++; if(acts.length<100) break; }
    const runTypes=new Set(['Run','VirtualRun','TrailRun','Treadmill']);
    let matched=0;
    all.forEach(act=>{
      if(!runTypes.has(act.type)&&!runTypes.has(act.sport_type)) return;
      const actDate=new Date(act.start_date_local);
      const dateStr=actDate.toISOString().split('T')[0];
      PHASES.forEach(p=>p.weeks.forEach(w=>{
        const wStart=WEEK_STARTS[w.n]; if(!wStart) return;
        w.days.forEach((day,di)=>{
          const dof=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(day.d);
          const d=new Date(wStart); d.setDate(d.getDate()+dof);
          if(d.toISOString().split('T')[0]===dateStr){
            const k=dk(w.n,di); if(!state[k]) state[k]={};
            state[k].kmActual=Math.round(act.distance/100)/10; matched++;
          }
        });
      }));
    });
    save(); renderPhase(); renderKmTotal();
    renderStravaBar('ok',`${matched} run${matched!==1?'s':''} synced`);
  } catch(e){ renderStravaBar('error','Sync failed'); }
}
function renderStravaBar(status,msg){
  const bar=document.getElementById('strava-bar'); if(!bar) return;
  bar.style.display='flex';
  if(status==='disconnected') bar.innerHTML=`<span class="strava-status">Strava not connected</span><button class="strava-btn" onclick="stravaConnect()">Connect Strava</button>`;
  else if(status==='syncing') bar.innerHTML=`<span class="strava-status">Syncing…</span>`;
  else if(status==='ok'){ const a=state.stravaTok?.athlete; bar.innerHTML=`<span class="strava-ok">●</span><span class="strava-status">${a?a.firstname+' '+a.lastname+' · ':''}${msg||'Connected'}</span><button class="strava-btn" onclick="stravaSync()">Sync now</button><button style="background:none;border:none;color:#bbb;font-size:12px;cursor:pointer;" onclick="stravaDisconnect()">Disconnect</button>`; }
  else if(status==='error') bar.innerHTML=`<span class="strava-err">${msg}</span><button class="strava-btn" onclick="stravaSync()">Retry</button>`;
}
function stravaConnect(){ window.location.href=stravaAuthUrl(); }
function stravaDisconnect(){ delete state.stravaTok; save(); renderStravaBar('disconnected'); }
async function stravaHandleCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'); if(!code) return false;
  history.replaceState({},'',window.location.pathname);
  renderStravaBar('syncing');
  const tok=await stravaExchangeCode(code);
  if(!tok.access_token){ renderStravaBar('error','Auth failed'); return true; }
  state.stravaTok=tok; save(); await stravaSync(); return true;
}
