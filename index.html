const STRAVA_CLIENT_ID = '145535';
const STRAVA_CLIENT_SECRET = '767368c2ff166a9e4707230699139b1dbe254953';
const STRAVA_REDIRECT = 'https://kelseykap.github.io/lmt/';

function stravaAuthUrl(){
  return `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(STRAVA_REDIRECT)}&approval_prompt=force&scope=activity:read_all`;
}
async function stravaExchangeCode(code){
  const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:STRAVA_CLIENT_ID,client_secret:STRAVA_CLIENT_SECRET,code,grant_type:'authorization_code'})});
  return r.json();
}
async function stravaRefreshToken(rt){
  const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:STRAVA_CLIENT_ID,client_secret:STRAVA_CLIENT_SECRET,refresh_token:rt,grant_type:'refresh_token'})});
  return r.json();
}
async function getStravaToken(){
  let tok=state.stravaTok; if(!tok) return null;
  if(Date.now()/1000>tok.expires_at-60){ const f=await stravaRefreshToken(tok.refresh_token); if(!f.access_token) return null; state.stravaTok=f; save(); tok=f; }
  return tok.access_token;
}
async function stravaSync(){
  renderStravaBar('syncing');
  const token=await getStravaToken(); if(!token){ renderStravaBar('disconnected'); return; }
  try{
    const after=Math.floor(new Date('2026-05-11').getTime()/1000);
    const before=Math.floor(new Date('2026-10-11').getTime()/1000);
    let page=1,all=[];
    while(true){
      const r=await fetch(`https://www.strava.com/api/v3/athlete/activities?after=${after}&before=${before}&per_page=100&page=${page}`,{headers:{Authorization:`Bearer ${token}`}});
      const acts=await r.json();
      if(!Array.isArray(acts)||acts.length===0) break;
      all=all.concat(acts); page++;
      if(acts.length<100) break;
    }

    // Activity type classification
    const RUN_TYPES  = new Set(['Run','VirtualRun','TrailRun','Treadmill']);
    const HIKE_TYPES = new Set(['Hike','Walk']);
    const STR_TYPES  = new Set(['WeightTraining','Workout','Crossfit','Yoga','Pilates']);

    let matched=0;
    all.forEach(act=>{
      const type = act.sport_type || act.type || '';
      const isRun  = RUN_TYPES.has(type);
      const isHike = HIKE_TYPES.has(type);
      const isStr  = STR_TYPES.has(type);
      if(!isRun && !isHike && !isStr) return;

      const actDate=new Date(act.start_date_local);
      const dateStr=actDate.toISOString().split('T')[0];

      PHASES.forEach(p=>p.weeks.forEach(w=>{
        const wStart=WEEK_STARTS[w.n]; if(!wStart) return;
        w.days.forEach((day,di)=>{
          const dof=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(day.d);
          const d=new Date(wStart); d.setUTCDate(d.getUTCDate()+dof);
          if(d.toISOString().split('T')[0]!==dateStr) return;

          const k=dk(w.n,di); if(!state[k]) state[k]={};
          const dayTag = day.tag;
          const addedTags = state[k].added||[];
          const isRunDay  = ['easy','workout','ml','long'].includes(dayTag)||addedTags.some(t=>['easy','workout','ml','long'].includes(t));
          const isHikeDay = dayTag==='hike'||addedTags.includes('hike');
          const isStrDay  = ['sa','sb','sl','strength'].includes(dayTag)||addedTags.some(t=>['sa','sb','sl','strength'].includes(t));

          if((isRun||isHike) && (isRunDay||isHikeDay)){
            // Store km
            state[k].kmActual = Math.round(act.distance/100)/10;
            state[k].stravaActivity = act.id;
            matched++;
          } else if(isStr && isStrDay){
            // Store duration in minutes
            const mins = Math.round((act.moving_time||act.elapsed_time||0)/60);
            state[k].strengthMins = mins;
            state[k].stravaActivity = act.id;
            matched++;
          }
        });
      }));
    });

    save(); renderPhase(); renderKmTotal();
    renderStravaBar('ok',`${matched} activit${matched!==1?'ies':'y'} synced`);
  } catch(e){ renderStravaBar('error','Sync failed'); }
}
function renderStravaBar(status,msg){
  const bar=document.getElementById('strava-bar'); if(!bar) return;
  bar.style.display='flex';
  if(status==='disconnected') bar.innerHTML=`<span class="strava-status">Strava not connected</span><button class="strava-btn" onclick="stravaConnect()">Connect Strava</button>`;
  else if(status==='syncing') bar.innerHTML=`<span class="strava-status">Syncing…</span>`;
  else if(status==='ok'){ bar.style.display='none'; }
  else if(status==='error') bar.innerHTML=`<span class="strava-err">${msg}</span><button class="strava-btn" onclick="stravaSync()">Retry</button>`;
}
function stravaConnect(){ window.location.href=stravaAuthUrl(); }
function stravaDisconnect(){ delete state.stravaTok; forceSyncNow(); renderStravaBar('disconnected'); }
async function stravaHandleCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'); if(!code) return false;
  history.replaceState({},'',window.location.pathname);
  renderStravaBar('syncing');
  const tok=await stravaExchangeCode(code);
  if(!tok.access_token){ renderStravaBar('error','Auth failed'); return true; }
  state.stravaTok=tok; save(); await stravaSync(); return true;
}

// ── BACKUP / RESTORE ────────────────────────────────────────────────────────
// Local recovery path in case sync ever fails — downloads a single JSON file
// with the full state (logged km, notes, custom phases, strength edits, etc.).
function exportBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `lmt-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
}

function importBackup(evt){
  const file = evt.target.files && evt.target.files[0];
  evt.target.value = ''; // reset so same-name re-import re-fires
  if(!file) return;
  if(!confirm('Replace current data with the backup file? Your current logged training will be overwritten.')) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || typeof parsed !== 'object') throw new Error('Not a valid backup');
      state = parsed;
      state._savedAt = Date.now();
      try{ localStorage.setItem('lm26_v5', JSON.stringify(state)); } catch(_){}
      loadCustomPhases();
      curW = getCurrentWeek();
      forceSyncNow();
      // Refresh visible tab
      renderPhase();
      if(activeTopTab === 'strength') renderStrength();
      if(activeTopTab === 'phases')   renderPhases();
      if(editorDraft){
        editorDraft = flattenPhasesForEditor(PHASES);
        renderPlanEditor();
      }
      alert('Backup restored.');
    } catch(e){
      alert('Could not read that file as a backup: '+e.message);
    }
  };
  reader.onerror = () => alert('Failed to read the file.');
  reader.readAsText(file);
}

// ── PLAN EDITOR ──────────────────────────────────────────────────────────────
// Working model while editing:
//   editorDraft = {
//     phases: [{label, shortLabel, note}, ...],   // ordered phase definitions
//     weeks:  [{date, km, heading, days, phaseIdx, n}, ...]  // flat list
//   }
// On save we regroup weeks by phaseIdx back into the PHASES shape.
let editorDraft = null;

const ED_TAG_OPTIONS = [
  {v:'easy',  label:'Easy'},
  {v:'workout',label:'Workout'},
  {v:'ml',    label:'Mid-long'},
  {v:'long',  label:'Long run'},
  {v:'sa',    label:'Strength A'},
  {v:'sb',    label:'Strength B'},
  {v:'sl',    label:'Light str.'},
  {v:'hike',  label:'Hike'},
  {v:'mobility', label:'Mobility'},
  {v:'rest',  label:'Rest'},
  {v:'race',  label:'Race'},
];

// Flatten PHASES into the editor's flat working model
function flattenPhasesForEditor(phases){
  const editPhases = phases.map(p => ({
    label: p.label || '',
    shortLabel: p.shortLabel || '',
    note: p.note || '',
  }));
  const weeks = [];
  phases.forEach((p, pi) => {
    (p.weeks || []).forEach(w => {
      const c = JSON.parse(JSON.stringify(w));
      c.phaseIdx = pi;
      if(c.heading == null) c.heading = '';
      weeks.push(c);
    });
  });
  return { phases: editPhases, weeks };
}

// Regroup flat weeks back into a PHASES-shaped array, in the order
// they appear in editorDraft.weeks (renumbering n sequentially).
function rebuildPhasesFromDraft(draft){
  const phases = draft.phases.map(p => ({
    label: p.label || '',
    shortLabel: p.shortLabel || '',
    note: p.note || '',
    weeks: [],
  }));
  let n = 1;
  draft.weeks.forEach(w => {
    const pi = Math.min(Math.max(0, w.phaseIdx|0), phases.length-1);
    const week = {
      n: n++,
      date: w.date || '',
      km: w.km || '',
      heading: (w.heading || '').trim(),
      days: (w.days || []).slice(0,7).map((d,i) => ({
        d: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i],
        tag: d.tag || 'easy',
        t: d.t == null ? '' : String(d.t),
      })),
    };
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    while(week.days.length < 7){
      week.days.push({d:dayNames[week.days.length], tag:'easy', t:''});
    }
    if(pi >= 0 && phases[pi]) phases[pi].weeks.push(week);
  });
  return phases;
}

function openPlanEditor(){
  editorDraft = flattenPhasesForEditor(PHASES);
  // Default phase if none exist yet
  if(!editorDraft.phases.length){
    editorDraft.phases.push({label:'Phase 1', shortLabel:'P1', note:''});
    editorDraft.weeks.forEach(w => w.phaseIdx = 0);
  }
  renderPlanEditor();
  document.getElementById('plan-editor').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePlanEditor(){
  if(planEditorDirty() && !confirm('Discard unsaved changes?')) return;
  editorDraft = null;
  document.getElementById('plan-editor').classList.remove('open');
  document.body.style.overflow = '';
}

function planEditorDirty(){
  try{
    return JSON.stringify(rebuildPhasesFromDraft(editorDraft))
        !== JSON.stringify(PHASES);
  } catch(e){ return false; }
}

function savePlanEditor(){
  if(!editorDraft) return;
  const newPhases = rebuildPhasesFromDraft(editorDraft);
  state.customPhases = newPhases;
  PHASES = JSON.parse(JSON.stringify(newPhases));
  recomputeWeekStarts();
  forceSyncNow();   // high-value structural edit — push immediately
  curW = getCurrentWeek();
  editorDraft = null;
  document.getElementById('plan-editor').classList.remove('open');
  document.body.style.overflow = '';
  if(activeTopTab === 'phases') renderPhases();
  renderPhase();
  renderKmTotal();
}

function renderPlanEditor(){
  const el = document.getElementById('plan-editor-body');
  if(!el || !editorDraft) return;

  // ── Phases section (top) ──
  let html = `<div class="ed-section">
    <div class="ed-section-head">
      <h3>Phases</h3>
      <button class="ed-add-week" onclick="edAddPhase()">+ Add phase</button>

    html += `<div class="ed-empty">No phases yet — add one above.</div>`;

    editorDraft.phases.forEach((p, pi) => {
      const weekCount = editorDraft.weeks.filter(w => w.phaseIdx === pi).length;
      html += `<div class="ed-phase-row">

  html += `</div></div>`;

  // ── Weeks section (single flat table) ──
  html += `<div class="ed-section">
    <div class="ed-section-head">
      <h3>Weeks</h3>
      <button class="ed-add-week" onclick="edAddWeek()">+ Add week</button>
    </div>
    <div class="ed-table-wrap">
    <table class="ed-table">
      <thead>
        <tr>
          <th style="width:36px;">#</th>
          <th style="width:140px;">Start date</th>
          <th style="width:120px;">Phase</th>
          <th style="width:140px;">Heading</th>
          <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th>
          <th>Fri</th><th>Sat</th><th>Sun</th>
          <th style="width:80px;">Total km</th>
          <th style="width:38px;"></th>
        </tr>
      </thead>
      <tbody>`;

  if(!editorDraft.weeks.length){
    html += `<tr><td colspan="13" class="ed-empty">No weeks yet — add one above.</td></tr>`;
  }

  const phaseOpts = editorDraft.phases.map((p, pi) =>
    `<option value="${pi}">${esc(p.shortLabel || p.label || ('Phase '+(pi+1)))}</option>`
  ).join('');

  editorDraft.weeks.forEach((w, wi) => {
    const parsedDate = parseWeekDate(w.date, 2026);
    const isoDate = parsedDate ? toIsoDate(parsedDate) : '';
    const selectedPhase = (w.phaseIdx == null) ? -1 : w.phaseIdx;
    const phaseSel = editorDraft.phases.length
      ? `<select class="ed-input" onchange="edUpdWeek(${wi},'phaseIdx',parseInt(this.value,10))">
           ${editorDraft.phases.map((p, pi) =>
             `<option value="${pi}"${pi===selectedPhase?' selected':''}>${esc(p.shortLabel || p.label || ('Phase '+(pi+1)))}</option>`
           ).join('')}
         </select>`
      : `<span class="ed-empty">No phases</span>`;

    html += `<tr>
      <td class="row-hdr"><strong>${wi+1}</strong></td>
      <td><input class="ed-input med" type="date" value="${isoDate}"
        onchange="edUpdWeekDate(${wi},this.value)"></td>

      <td><input class="ed-input" type="text" list="ed-heading-suggestions"
        value="${escA(w.heading||'')}"
        oninput="edUpdWeek(${wi},'heading',this.value)" placeholder=""></td>`;
    (w.days||[]).forEach((day, di) => {
      const tagSel = ED_TAG_OPTIONS.map(o =>
        `<option value="${o.v}"${o.v===day.tag?' selected':''}>${o.label}</option>`
      ).join('');
      html += `<td><div class="ed-day-cell">
        <select onchange="edUpdDay(${wi},${di},'tag',this.value)">${tagSel}</select>
        <textarea oninput="edUpdDay(${wi},${di},'t',this.value)" rows="2" placeholder="—">${esc(day.t||'')}</textarea>
      </div></td>`;
    });
    html += `<td><input class="ed-input small" type="text" value="${escA(w.km||'')}"
        oninput="edUpdWeek(${wi},'km',this.value)" placeholder="e.g. 60"></td>
      <td><button class="ed-row-del" onclick="edDelWeek(${wi})" title="Delete week">×</button></td>
    </tr>`;
  });

  html += `</tbody></table></div>
    <datalist id="ed-heading-suggestions">
      <option value="Travel">
      <option value="Cutback">
      <option value="Taper">
      <option value="Race">
    </datalist>
    <div class="ed-section-foot">${editorDraft.weeks.length} week${editorDraft.weeks.length===1?'':'s'} total</div>
  </div>`;

  el.innerHTML = html;
}

// ── Editor update helpers (mutate draft silently to preserve focus) ──
function edUpdPhase(pi, key, val){
  if(!editorDraft) return;
  editorDraft.phases[pi][key] = val;
  // shortLabel/label changes affect the phase dropdown in week rows — light rerender
  if(key === 'shortLabel' || key === 'label'){ /* don't rerender; user is typing */ }
}
function edUpdWeek(wi, key, val){
  if(!editorDraft) return;
  editorDraft.weeks[wi][key] = val;
}
function edUpdWeekDate(wi, isoVal){
  if(!editorDraft) return;
  const d = fromIsoDate(isoVal);
  editorDraft.weeks[wi].date = d ? formatWeekDate(d) : isoVal;
}
function edUpdDay(wi, di, key, val){
  if(!editorDraft) return;
  if(!editorDraft.weeks[wi].days[di]) editorDraft.weeks[wi].days[di] = {d:'',tag:'easy',t:''};
  editorDraft.weeks[wi].days[di][key] = val;
}

function edAddPhase(){
  if(!editorDraft) return;
  const newIdx = editorDraft.phases.length;
  editorDraft.phases.push({
    label: 'Phase ' + (newIdx+1),
    shortLabel: 'P' + (newIdx+1),
    note: '',
  });
  renderPlanEditor();
}

function edDelPhase(pi){
  if(!editorDraft) return;
  const inPhase = editorDraft.weeks.filter(w => w.phaseIdx === pi).length;
  if(editorDraft.phases.length <= 1){
    alert('Need at least one phase. Add a new one before deleting this.');
    return;
  }
  if(inPhase && !confirm(`Delete this phase? Its ${inPhase} week${inPhase===1?'':'s'} will move to the previous phase.`)){
    return;
  }
  editorDraft.phases.splice(pi, 1);
  // Reassign weeks: any week pointing at pi or beyond shifts down
  editorDraft.weeks.forEach(w => {
    if(w.phaseIdx === pi) w.phaseIdx = Math.max(0, pi-1);
    else if(w.phaseIdx > pi) w.phaseIdx -= 1;
  });
  renderPlanEditor();
}

function edAddWeek(){
  if(!editorDraft) return;
  if(!editorDraft.phases.length){
    editorDraft.phases.push({label:'Phase 1', shortLabel:'P1', note:''});
  }
  const last = editorDraft.weeks[editorDraft.weeks.length - 1];
  let nextDate;
  let phaseIdx = 0;
  if(last){
    const d = parseWeekDate(last.date, 2026);
    if(d){ nextDate = new Date(d); nextDate.setUTCDate(nextDate.getUTCDate()+7); }
    if(last.phaseIdx != null) phaseIdx = last.phaseIdx;
  }
  if(!nextDate) nextDate = new Date();
  editorDraft.weeks.push({
    phaseIdx,
    date: formatWeekDate(nextDate),
    km: '',
    heading: '',
    days: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>({d,tag:'easy',t:''})),
  });
  renderPlanEditor();
}

function edDelWeek(wi){
  if(!editorDraft) return;
  if(!confirm('Delete this week?')) return;
  editorDraft.weeks.splice(wi, 1);
  renderPlanEditor();
}

});
  }
});
