<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LM Training">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Lisbon Marathon 2026 Training Plan">
<link rel="manifest" href="manifest.json">
<title>LMT</title>
<link rel="icon" type="image/png" href="logo-3.png">
<link rel="apple-touch-icon" href="logo-3.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
/* Aileron — use local file if available, else fall back to Barlow */
@font-face{font-family:'Aileron';src:url('Aileron-Regular.otf') format('opentype');font-weight:400;}
@font-face{font-family:'Aileron';src:url('Aileron-Bold.otf') format('opentype');font-weight:700;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Helvetica,Arial,sans-serif;background:url('lmt-background.png') center center / cover no-repeat fixed, #E8501A;color:#3C3C3C;font-size:17px;}

/* ── PALETTE ──
  teal   #087E8B
  coral  #E8501A
  dark   #3C3C3C
  light  #F5F5F5
  mauve  #C1839F
*/

/* ══════════════════════════════════════════════
   APP SHELL LAYOUT
══════════════════════════════════════════════ */

/* ── HOME SCREEN ── */
#home-screen{
  position:fixed;inset:0;z-index:10;
  background:transparent;
  display:flex;flex-direction:column;
  align-items:center;
  padding:env(safe-area-inset-top,0) 0 0;
  transition:transform 0.42s cubic-bezier(.4,0,.2,1), opacity 0.3s;
}
#home-screen.hidden{
  transform:translateY(-30px);
  opacity:0;
  pointer-events:none;
}
#home-header{
  padding:calc(36px + 48px) 0 0;
  /* space reserved for fixed global logo */
}
/* global logo — sits above both screens */
#global-logo{
  position:fixed;
  top:calc(36px + env(safe-area-inset-top, 0px));
  left:50%;
  transform:translateX(-50%);
  height:48px;
  width:200px;
  background:url('logo-home.png') center center / contain no-repeat;
  z-index:200;
  cursor:pointer;
}
#home-quote-wrap{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:0 32px 60px;
  text-align:center;
}
#home-quote{
  font-family:'Aileron',Helvetica,Arial,sans-serif;
  font-weight:400;
  font-size:20px;
  line-height:1.25;
  color:#fffedf;
  max-width:460px;
}
#home-stats{
  display:flex;
  gap:0;
  padding:0 0 24px;
  align-items:flex-end;
  justify-content:center;
  width:100%;
  max-width:360px;
}
.home-stat{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:0 16px;}
.home-stat-num{font-size:42px;font-weight:700;letter-spacing:-2px;line-height:1;font-family:'Aileron',Helvetica,Arial,sans-serif;color:#fffedf;}
.home-stat-lbl{font-size:10px;font-weight:400;text-transform:uppercase;letter-spacing:0.12em;color:#fffedf;opacity:0.7;font-family:'Aileron',Helvetica,Arial,sans-serif;}
.home-stat-num.teal{color:#fffedf;}
.home-stat-num.orange{color:#fffedf;}
#home-actions{
  padding:12px 0 max(28px, env(safe-area-inset-bottom,28px));
  display:flex;justify-content:center;
}
#home-arrow{
  font-size:36px;font-weight:900;color:rgba(255,254,223,0.8);cursor:pointer;
  animation:bounce 2s infinite;
  user-select:none;
}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* ── CONTENT PANEL ── */
#content-panel{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;
  transform:translateY(100vh);
  transition:transform 0.42s cubic-bezier(.4,0,.2,1);
  background:transparent;
  padding-top:env(safe-area-inset-top,0);
  overflow:hidden;
}
#content-panel.open{transform:translateY(0);}
#content-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:transparent;}

/* ── TAB BAR (PLAN / STRENGTH headings) ── */
#tab-bar{
  display:flex;flex-direction:column;
  background:transparent;
  padding:calc(36px + 48px + 36px) 32px 14px;
  flex-shrink:0;
  position:relative;
}
.tab-row-bottom{position:relative;z-index:1;}
/* Sync status chip — small badge top right, only shows when not idle. */
#sync-status{
  position:fixed;
  top:calc(env(safe-area-inset-top, 0px) + 12px);
  right:12px;
  z-index:300;
  display:none;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border-radius:99px;
  font-family:Helvetica,Arial,sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:0.06em;text-transform:uppercase;
  background:rgba(0,0,0,0.55);color:#fffedf;
  border:none;cursor:pointer;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}
#sync-status.ss-saving,#sync-status.ss-loading{background:rgba(0,0,0,0.55);color:#fffedf;}
#sync-status.ss-saved {background:rgba(8,126,139,0.85);color:#fff;}
#sync-status.ss-error {background:#E8501A;color:#fff;}
#edit-plan-btn{
  margin-left:auto;
  align-self:flex-end;
  width:32px;height:32px;
  background:transparent;
  border:none;
  color:rgba(255,254,223,0.5);
  cursor:pointer;
  padding:6px;
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transition:color 0.15s, background 0.15s;
  /* nudge a few px so the pencil rests on the same baseline as the tab text,
     just above the white tab divider */
  margin-bottom:2px;
}
#edit-plan-btn:hover{color:#fffedf;background:rgba(255,255,255,0.08);}
#edit-plan-btn:active{transform:scale(0.95);}

/* ── PLAN EDITOR OVERLAY ── */
#plan-editor{
  position:fixed;inset:0;z-index:300;
  background:#1a1a1a;
  display:none;
  flex-direction:column;
  color:#fffedf;
  font-family:Helvetica,Arial,sans-serif;
}
#plan-editor.open{display:flex;}
#plan-editor-head{
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top, 0px) + 16px) 20px 12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  background:#1a1a1a;
  flex-shrink:0;
  gap:12px;
}
#plan-editor-head h2{font-size:20px;font-weight:700;margin:0;letter-spacing:-0.3px;}
/* Actions on their own row so nothing is squished on narrow phones. */
.editor-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.editor-actions-spacer{flex:1;}
.editor-btn{
  font-size:13px;
  background:#2a2a2a;color:#fffedf;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:6px;
  padding:8px 14px;
  font-family:inherit;font-weight:600;
  cursor:pointer;
}
.editor-btn:hover{background:#333;}
.editor-btn.primary{background:#E8501A;border-color:#E8501A;color:#fff;}
.editor-btn.primary:hover{background:#d3471a;}
.editor-btn.ghost{background:transparent;}
.editor-btn.danger{background:transparent;color:#E8501A;border-color:rgba(232,80,26,0.4);}
.editor-btn.danger:hover{background:rgba(232,80,26,0.1);}
#plan-editor-body{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:16px 12px 80px;}
.ed-section{margin-bottom:22px;background:#222;border-radius:10px;padding:14px;}
.ed-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.ed-section-head h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.5);margin:0;}
.ed-section-foot{margin-top:10px;font-size:11px;color:rgba(255,255,255,0.4);}
.ed-phases-grid{display:flex;flex-direction:column;gap:6px;}
.ed-phase-row{display:flex;align-items:center;gap:8px;background:#1a1a1a;border-radius:6px;padding:6px 8px;}
.ed-phase-row .ed-input{flex-shrink:1;min-width:0;}
.ed-phase-row .ed-input.wide{flex:1;min-width:120px;}
.ed-phase-row .ed-input.small{flex:0 0 90px;}
.ed-phase-num{width:22px;font-size:11px;color:rgba(255,255,255,0.4);font-weight:700;text-align:center;flex-shrink:0;}
.ed-phase-meta{font-size:11px;color:rgba(255,255,255,0.4);white-space:nowrap;}
.ed-empty{padding:14px;color:rgba(255,255,255,0.4);font-size:13px;text-align:center;font-style:italic;}
.ed-input{
  background:#1a1a1a;color:#fffedf;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:5px;
  padding:5px 8px;
  font-size:13px;font-family:inherit;
  outline:none;
}
.ed-input:focus{border-color:#E8501A;}
.ed-input.wide{flex:1;min-width:160px;}
.ed-input.full{width:100%;display:block;margin-top:8px;}
.ed-input.tiny{width:46px;text-align:center;}
.ed-input.small{width:80px;}
.ed-input.med{width:120px;}

.ed-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:6px;}
table.ed-table{border-collapse:collapse;width:100%;font-size:12px;min-width:920px;}
.ed-table th, .ed-table td{
  border:1px solid rgba(255,255,255,0.08);
  padding:4px;
  vertical-align:top;
  text-align:left;
}
.ed-table th{
  background:#1a1a1a;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:rgba(255,255,255,0.5);
  white-space:nowrap;
  padding:6px 6px;
  position:sticky;top:0;z-index:1;
}
.ed-table td{background:#252525;}
.ed-table td.row-hdr{background:#1a1a1a;}
.ed-day-cell{display:flex;flex-direction:column;gap:3px;min-width:120px;}
.ed-day-cell select{
  background:#1a1a1a;color:#fffedf;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;
  padding:3px 4px;
  font-size:10px;
  font-family:inherit;
  text-transform:uppercase;
  letter-spacing:0.04em;
}
.ed-day-cell textarea{
  background:#1a1a1a;color:#fffedf;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;
  padding:5px 6px;
  font-size:12px;
  font-family:inherit;
  resize:vertical;
  min-height:36px;
  width:100%;outline:none;line-height:1.3;
}
.ed-day-cell textarea:focus,.ed-day-cell select:focus{border-color:#E8501A;outline:none;}
.ed-row-actions{display:flex;flex-direction:column;gap:4px;align-items:center;}
.ed-row-del{
  background:transparent;border:none;color:#E8501A;
  cursor:pointer;font-size:18px;padding:2px 6px;
  line-height:1;
}
.ed-row-del:hover{background:rgba(232,80,26,0.1);border-radius:4px;}
.ed-phase-foot{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}
.ed-add-week{
  background:transparent;border:1px dashed rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.6);
  border-radius:6px;padding:6px 12px;
  font-size:12px;cursor:pointer;font-family:inherit;
}
.ed-add-week:hover{border-color:#E8501A;color:#E8501A;}
.ed-phase-bottom{margin-top:24px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.ed-help{
  background:rgba(255,255,255,0.04);border-radius:8px;
  padding:12px 14px;
  font-size:12px;line-height:1.5;
  color:rgba(255,255,255,0.55);
  margin-bottom:16px;
}
.ed-help strong{color:#fffedf;}
.ed-week-label-input{
  display:inline-block;width:auto;min-width:80px;
}
.ed-label-select{display:inline-block;}
.tab-row{display:flex;align-items:baseline;gap:12px;position:relative;z-index:1;}
.top-tab{
  display:inline;width:auto;
  padding:0;margin:0;
  background:none;border:none;
  font-family:Helvetica,Arial,sans-serif;
  font-size:36px;font-weight:300;
  color:#fffedf;text-align:left;
  cursor:pointer;line-height:1.1;
  letter-spacing:-0.5px;
}
.top-tab.active{font-weight:900;}
#tab-divider{height:3px;background:#fffedf;margin:0 -32px 0;flex-shrink:0;}

/* ── PHASE NAV ── */
#phase-nav-row{background:#423d3d;flex-shrink:0;padding:0 20px;}
.phase-nav{display:flex;width:100%;background:transparent;border-bottom:1px solid rgba(255,255,255,0.1);}
.phase-btn{flex:1;padding:12px 0;font-size:12px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,0.35);border-bottom:2px solid transparent;font-family:inherit;text-align:center;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.phase-btn.active{color:#fff;border-bottom-color:#E8501A;}

/* strava */
.strava-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:#2e2a2a;border-top:1px solid rgba(255,255,255,0.1);font-size:13px;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom,10px));}
.strava-btn{background:#E8501A;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.strava-status{color:rgba(255,255,255,0.4);font-size:13px;}
.strava-ok{color:#E8501A;font-weight:600;}
.strava-err{color:#E8501A;}

/* keep old header harmless */
.sticky-top{display:none;}.header{display:none;}
.hdr-body,.hdr-logo,.hdr-quote-text,.hdr-countdown,.hdr-km-total{display:none;}
@media(hover:none){.add-btn{width:26px;height:26px;}}

/* ── CONTENT AREA ── */
.content{padding:20px 32px 40px;max-width:960px;}
.phase-section{margin-bottom:32px;}

/* phase note toggle — uses phase label as heading */
.phase-note{background:transparent;border:none;margin-bottom:12px;position:relative;}
.phase-note-inner{padding:10px 0 6px;}
.phase-note-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;user-select:none;}
.phase-note-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.4);}
.phase-note-toggle:hover .phase-note-title{color:#fff;}
.pn-arrow{font-size:10px;transition:transform 0.2s;display:inline-block;color:rgba(255,255,255,0.3);}
.phase-note-toggle.open .pn-arrow{transform:rotate(90deg);}
.phase-note-body{display:none;}
.phase-note-body.open{display:block;}
.phase-note strong{color:#fff;font-weight:600;}
.phase-note-display{cursor:pointer;font-size:13px;color:rgba(255,255,255,0.55);line-height:1.6;}
.phase-note-display:hover{color:#fff;}
.phase-note-edit{width:100%;font-size:13px;font-family:inherit;color:#fff;line-height:1.65;border:none;border-bottom:1px solid rgba(255,255,255,0.2);outline:none;background:transparent;resize:none;min-height:60px;}
.phase-note-actions{margin-top:8px;display:flex;gap:8px;}
.btn-save{font-size:12px;color:#fff;background:#E8501A;border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-family:inherit;font-weight:600;}
.btn-discard{font-size:12px;color:rgba(255,255,255,0.4);background:none;border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:4px 12px;cursor:pointer;font-family:inherit;}

/* ── WEEK CARDS ── */
.week{background:#fff;border-radius:16px;margin-bottom:18px;overflow:visible;}
.week.current-week{box-shadow:0 0 0 3px #E8501A;}
.week-hdr{padding:18px 18px 14px;display:flex;flex-direction:column;cursor:pointer;user-select:none;border-radius:16px;}
.week-hdr:hover{background:#fafafa;}
.week-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.week-title{font-size:17px;font-weight:800;color:#111;letter-spacing:-0.3px;}
.week-date{font-size:15px;color:#bbb;font-weight:400;margin-left:6px;}
.week-phase-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#bbb;}
.current-label{display:none;}
.week-run-icons{display:flex;gap:5px;margin-bottom:10px;width:100%;}
.run-icon{flex:1;height:6px;border-radius:3px;border:1.5px solid #e98260;background:transparent;transition:background 0.15s;}
.run-icon.filled{background:#e98260;border-color:#e98260;}
.run-icon:not(.filled){border-width:1px;border-color:rgba(233,130,96,0.35);}
/* stats row */
.week-stats-row{display:flex;justify-content:space-between;align-items:center;}
.week-runs-stat{font-size:15px;color:#bbb;font-weight:400;}
.week-runs-stat .done-count{font-weight:700;color:#111;font-size:15px;}
.km-badge-wrap{display:flex;align-items:baseline;gap:0;}
.km-actual-badge{font-size:15px;font-weight:700;color:#111;}
.km-planned-line{font-size:15px;color:#bbb;font-weight:400;}
.week-body{display:none;border-top:1px solid #f0f0f0;border-radius:0 0 8px 8px;overflow:visible;}
.week-body.open{display:block;}

/* day row — 3 cols: left(day+add) | middle(pills+notes) | right(check+km) */
.day-row{display:grid;grid-template-columns:52px 1fr 44px;gap:0 2px;padding:12px 16px;border-bottom:1px solid #f0f0f0;position:relative;background:#fff;z-index:1;}.day-row.open-drop{z-index:50;}
.day-row:last-child{border-bottom:none;border-radius:0 0 16px 16px;}
.day-row.past{background:#fafafa;}
.day-col-left{grid-column:1;display:flex;align-items:flex-start;padding-top:2px;}
.day-col-middle{grid-column:2;display:flex;flex-direction:column;gap:5px;min-width:0;}
.day-col-right{grid-column:3;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;}
.day-check{
  appearance:none;-webkit-appearance:none;
  width:18px;height:18px;
  border-radius:3px;
  border:1.5px solid #bbb;
  background:transparent;
  cursor:pointer;flex-shrink:0;margin:0;
  position:relative;
  transition:background 0.15s, border-color 0.15s;
}
.day-check:checked{
  background:#93c47e;
  border-color:#93c47e;
}
.day-check:checked::after{
  content:'';
  position:absolute;
  left:4px;top:1px;
  width:5px;height:9px;
  border:2px solid #fff;
  border-top:none;border-left:none;
  transform:rotate(45deg);
  display:block;
}
.day-row.done .day-main{opacity:0.35;}
.day-row.done .tags-area{opacity:0.4;}
.day-col-km{display:flex;align-items:center;justify-content:flex-end;}
.day-label{font-size:15px;color:#bbb;font-weight:600;}
.tags-area{display:flex;flex-wrap:wrap;gap:6px 6px;align-items:center;row-gap:6px;}
.day-main{min-width:0;}
.day-text-display{font-size:16px;color:#3C3C3C;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s;word-break:break-word;line-height:1.4;display:inline;}
.day-text-display:hover{border-bottom-color:#ccc;}
.day-text-empty{color:transparent;font-style:italic;font-size:12px;display:inline;}
.day-row:hover .day-text-empty{color:#ccc;}
.day-text-input{font-size:16px;color:#3C3C3C;border:none;border-bottom:1px solid #aaa;background:transparent;outline:none;font-family:inherit;width:100%;resize:none;height:22px;line-height:22px;padding:0;overflow:hidden;display:block;}
.day-row.drag-target-day{background:#f0fafb;outline:2px dashed #087E8B;outline-offset:-2px;border-radius:4px;}
.missed-label{font-size:9px;font-weight:700;color:#E8501A;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;padding-right:6px;opacity:0.7;}
.day-row.missed-run .t-easy,.day-row.missed-run .t-workout,.day-row.missed-run .t-ml,.day-row.missed-run .t-long{background:#e0c4b8 !important;color:#a0786a !important;}
.note-preview{font-size:11px;color:#bbb;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.3;}
.note-preview:hover{color:#777;}
.note-add{color:transparent;font-style:italic;transition:color 0.15s;}
.day-row:hover .note-add{color:#ccc;}
.note-add:hover{color:#999 !important;}

/* tags — run types: tonal teal; activity types: individual palette colours */
.tag{display:inline-block;padding:4px 11px;border-radius:4px;font-size:13px;font-weight:600;white-space:nowrap;vertical-align:middle;letter-spacing:0.01em;}
/* run types — tonal teal from light → dark */
.t-easy{background:#e98260;color:#fffedf;}
.t-ml{background:#e98260;color:#fffedf;}
.t-workout{background:#e98260;color:#fffedf;}
.t-long{background:#e98260;color:#fffedf;}
/* strength */
.t-sa,.t-sb,.t-sl,.t-strength{background:#e2b279;color:#fffedf;}
/* activities */
.t-yoga{background:#98b2bf;color:#fffedf;}
.t-hike{background:#98b2bf;color:#fffedf;}
.t-mobility{background:#98b2bf;color:#fffedf;}
.t-swim{background:#98b2bf;color:#fffedf;}
.t-pilates{background:#fde5dc;color:#E8501A;}

<!-- Global logo — always on top -->
<div id="global-logo" onclick="closeContentPanel()"></div>

<!-- Dropdown portal — outside content-panel so transform doesn't trap it -->
<div id="dropdown-portal" style="position:fixed;inset:0;z-index:9999;pointer-events:none;"></div>

<!-- ── HOME SCREEN ────────────────────────────────── -->
<div id="home-screen">
  <div id="home-header"></div>
  <div id="home-quote-wrap">
    <div id="home-quote"></div>
  </div>
  <div id="home-stats">
    <div id="home-countdown"></div>
    <div id="home-km"></div>
  </div>
  <div id="home-actions">
    <div id="home-arrow" onclick="showTab('plan')">↓</div>
  </div>
</div>

<!-- ── CONTENT PANEL (slides up over home) ────────── -->
<div id="content-panel">
  <!-- tab bar with logo + headings -->
  <div id="tab-bar">
    <div class="tab-row">
      <button class="top-tab active" id="tab-btn-plan" onclick="showTab('plan')">Plan</button>
      <button class="top-tab" id="tab-btn-phases" onclick="showTab('phases')">Phases</button>
      <button class="top-tab" id="tab-btn-stats" onclick="showTab('stats')">Stats</button>
    </div>
    <div class="tab-row tab-row-bottom">
      <button class="top-tab" id="tab-btn-strength" onclick="showTab('strength')">Strength</button>
      <button class="top-tab" id="tab-btn-today" onclick="showTab('today')">Today</button>
      <button id="edit-plan-btn" onclick="openPlanEditor()" title="Edit plan" aria-label="Edit plan">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
      </button>
    </div>
  </div>
  <div id="tab-divider"></div>
  <!-- scrollable content -->
  <button id="sync-status" type="button" title="Tap to retry sync" onclick="forceSyncNow()" style="display:none;"></button>
  <div id="content-scroll">
    <div id="tab-plan">
      <div class="content" id="content"></div>
    </div>
    <div id="tab-strength" class="strength-page">
      <div class="str-grid" id="strGrid"></div>
    </div>
    <div id="tab-phases" class="phases-page" style="display:none;">
      <div id="phases-content"></div>
    </div>
    <div id="tab-stats" class="stats-page" style="display:none;">
      <div id="stats-content"></div>
    </div>
    <!-- Today tab shares the same #content div — just a different scroll/open state -->
  </div>
  <!-- strava bar pinned to bottom -->
  <div id="strava-bar" class="strava-bar" style="display:none;"></div>
</div>

<!-- ── PLAN EDITOR OVERLAY ────────── -->
<div id="plan-editor">
  <div id="plan-editor-head">
    <h2>Edit plan</h2>
    <div class="editor-actions">
      <button class="editor-btn ghost" onclick="exportBackup()" title="Download a JSON backup of all your data">Export</button>
      <button class="editor-btn danger" onclick="resetPlanToDefaults()">Reset</button>
      <span class="editor-actions-spacer"></span>
      <button class="editor-btn ghost" onclick="closePlanEditor()">Cancel</button>
      <button class="editor-btn primary" onclick="savePlanEditor()">Save</button>
    </div>
  </div>
  <div id="plan-editor-body"></div>
</div>

// Normalize a week: legacy travel/cutback/taper/race booleans → single `heading` string.
// Heading is now a free-text label shown next to the week number ("W4 — Travel" etc.).
function normalizeWeekHeading(w){
  if(w.heading == null){
    if(w.travel)       w.heading = 'Travel';
    else if(w.cutback) w.heading = 'Cutback';
    else if(w.taper)   w.heading = 'Taper';
    else if(w.race)    w.heading = 'Race';
    else               w.heading = '';
  }
  delete w.travel; delete w.cutback; delete w.taper; delete w.race;
  return w;
}
function normalizePhases(phases){
  phases.forEach(p => p.weeks.forEach(normalizeWeekHeading));
  return phases;
}

// returns the intended calendar date regardless of the user's local timezone.

function parseWeekDate(str, fallbackYear){
  // Accepts "11 May", "1 Jun", "5 Oct" — uses fallbackYear (default 2026)
  if(!str) return null;
  const m = String(str).trim().match(/^(\d{1,2})\s+([A-Za-z]{3,})/);
  if(!m) return null;
  const day = parseInt(m[1],10);
  const monKey = m[2].slice(0,3);
  const monKeyCap = monKey.charAt(0).toUpperCase() + monKey.slice(1).toLowerCase();
  if(!(monKeyCap in MONTHS)) return null;
  return new Date(Date.UTC(fallbackYear||2026, MONTHS[monKeyCap], day));
}
function formatWeekDate(d){
  if(!d) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getUTCDate()} ${months[d.getUTCMonth()]}`;
}
function toIsoDate(d){
  if(!d) return '';
  return d.toISOString().slice(0,10);
}
function fromIsoDate(s){
  if(!s) return null;
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  return new Date(Date.UTC(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10)));
}

function recomputeWeekStarts(){
  WEEK_STARTS = {};
  PHASES.forEach(p => {
    p.weeks.forEach(w => {
      const d = parseWeekDate(w.date, 2026);
      if(d) WEEK_STARTS[w.n] = d;
    });
  });
}
recomputeWeekStarts();

function getCurrentWeek(){
  const now = new Date();
  let cur = null;
  const wns = Object.keys(WEEK_STARTS).map(Number).sort((a,b)=>a-b);
  for(let i=0;i<wns.length;i++){
    const start = WEEK_STARTS[wns[i]];
    const end = i+1<wns.length ? WEEK_STARTS[wns[i+1]] : new Date(start.getFullYear(), start.getMonth(), start.getDate()+7);
    if(now>=start && now<end){ cur=wns[i]; break; }
  }
  return cur;
}

};

let syncTimer = null;
let syncStatus = 'idle'; // idle | saving | saved | error | loading

function setSyncStatus(s, msg){
  syncStatus = s;
  const el = document.getElementById('sync-status');
  if(!el) return;
  const labels = {
    idle:    '',
    saving:  'Saving…',
    saved:   'Saved',
    error:   msg || 'Sync failed',
    loading: 'Syncing…',
  };
  const text = labels[s] != null ? labels[s] : (msg || '');
  el.textContent = text;
  el.classList.remove('ss-saving','ss-saved','ss-error','ss-loading','ss-idle');
  el.classList.add('ss-'+s);
  // Hide when idle so we don't waste pixels; show otherwise so the user
  // always knows when something failed instead of finding out by losing data.
  el.style.display = (s === 'idle' || !text) ? 'none' : 'inline-flex';
}

// UPSERT via POST + Prefer:resolution=merge-duplicates.
// PATCH ?id=eq.main silently succeeds with 0 rows changed when no main row exists,
// which silently dropped every save on devices that had never had the row created.
//
// `opts.keepalive` — only set this from the pagehide flush. Browsers cap keepalive
//  fetches at 64 KB body and silently fail above that, which becomes very wrong
//  once the user's state grows (custom phases + logged km + day notes can easily
//  push past 64 KB). Foreground saves use plain fetch with no size limit.
async function pushToSupabase(opts){
  opts = opts || {};
  setSyncStatus('saving');
  const payload = {
    id: 'main',
    data: state,
    updated_at: new Date().toISOString(),
  };
  const bodyStr = JSON.stringify(payload);
  const bytes = new Blob([bodyStr]).size;
  try{
    const res = await fetch(`${SB_URL}/rest/v1/training_log`, {
      method:'POST',
      headers:{
        ...SB_HEADERS,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=minimal',
      },
      body: bodyStr,
      keepalive: !!opts.keepalive,
    });
    if(!res.ok){
      let body = '';
      try{ body = await res.text(); } catch(_){}
      console.warn(`[LMT sync] push failed: HTTP ${res.status} (${bytes} bytes)`, body.slice(0,200));
      throw new Error(`HTTP ${res.status} ${body.slice(0,120)}`);
    }
    state._syncedAt = Date.now();
    try{ localStorage.setItem('lm26_v5', JSON.stringify(state)); } catch(_){}
    console.log(`[LMT sync] saved ${bytes} bytes at ${new Date().toISOString()}`);
    setSyncStatus('saved');
    setTimeout(()=>{ if(syncStatus==='saved') setSyncStatus('idle'); }, 3500);
    return true;
  } catch(e){
    console.error('[LMT sync] push error:', e);
    setSyncStatus('error', 'sync failed — tap to retry');
    return false;
  }
}

async function pullFromSupabase(){
  setSyncStatus('loading');
  try{
    const res = await fetch(`${SB_URL}/rest/v1/training_log?id=eq.main&select=data,updated_at`, {
      headers: {'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`},
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows = await res.json();
    if(!rows.length) { setSyncStatus('idle'); return false; }

    const remote = rows[0].data || {};
    const remoteTime = new Date(rows[0].updated_at||0).getTime();
    const localTime = state._savedAt || 0;

    if(remoteTime > localTime){
      // Remote is newer — merge into state
      state = {...state, ...remote};
      state._syncedAt = Date.now();
      try{ localStorage.setItem('lm26_v5', JSON.stringify(state)); } catch(_){}
      setSyncStatus('idle');
      // Re-hydrate live PHASES + WEEK_STARTS from the merged remote customPhases
      // so the UI actually reflects what just came down.
      loadCustomPhases();
      curW = getCurrentWeek();
      return true;
    }
    setSyncStatus('idle');
    return false;
  } catch(e){
    console.error('Supabase pull failed:', e);
    setSyncStatus('error', 'offline');
    setTimeout(()=>{ if(syncStatus==='error') setSyncStatus('idle'); }, 3000);
    return false;
  }
}

// Standard save — writes locally now, pushes to Supabase after a short debounce
// so rapid typing doesn't flood the network.
function save(){
  state._savedAt = Date.now();
  try{ localStorage.setItem('lm26_v5', JSON.stringify(state)); } catch(e){}
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToSupabase, 1200);
}

// Force-flush: bypasses the debounce. Used by structural edits where the user
// would reasonably expect "saved" immediately — plan editor save, strength
// block add/delete/rename, drag-drop, reset.
function forceSyncNow(){
  state._savedAt = Date.now();
  try{ localStorage.setItem('lm26_v5', JSON.stringify(state)); } catch(e){}
  clearTimeout(syncTimer);
  return pushToSupabase();
}

// Final-chance flush: when the tab is about to go away, fire a non-debounced
// push so the user doesn't lose the last 1.2s of typing.
function flushOnExit(){
  if(syncTimer){
    clearTimeout(syncTimer);
    syncTimer = null;
    // Don't await — page may already be unloading. keepalive:true tells the
    // browser to keep the request alive across unload (best-effort, capped at
    // 64 KB body which is fine for the small delta we have left to flush).
    pushToSupabase({keepalive: true});
  }
}
window.addEventListener('pagehide', flushOnExit);

function renderStats(){
  const el = document.getElementById('stats-content');
  if(!el) return;
  const RUN_TAGS = ['easy','workout','ml','long'];
  const STR_TAGS = ['sa','sb','sl','strength'];
  let totalRuns=0, doneRuns=0, missedRuns=0, totalKm=0, longestRun=0;
  let totalStrSessions=0, doneStrSessions=0, totalStrMins=0;
  const today = new Date(); today.setHours(0,0,0,0);

  PHASES.forEach(p=>p.weeks.forEach(w=>{
    const wStart = WEEK_STARTS[w.n];
    w.days.forEach((day,di)=>{
      const s = state[dk(w.n,di)]||{};
      const isRunDay = (RUN_TAGS.includes(day.tag)&&!s.plannedHidden)||((s.added||[]).some(t=>RUN_TAGS.includes(t)));
      const isStrDay = (STR_TAGS.includes(day.tag)&&!s.plannedHidden)||((s.added||[]).some(t=>STR_TAGS.includes(t)));
      let dayDate = null;
      if(wStart){ const dof=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(day.d); dayDate=new Date(wStart); dayDate.setDate(dayDate.getDate()+dof); }
      const isPast = dayDate ? dayDate < today : false;

      if(isRunDay){
        totalRuns++;
        const km = parseFloat(s.kmActual);
        if(km>0){ doneRuns++; totalKm+=km; if(km>longestRun) longestRun=km; }
        else if(isPast){ missedRuns++; }
      }
      if(isStrDay){
        totalStrSessions++;
        const mins = parseInt(s.strengthMins);
        if(mins>0){ doneStrSessions++; totalStrMins+=mins; }
      }
    });
  }));

  const fmt = v => v%1===0?v:Math.round(v*10)/10;
  const pctDone = totalRuns>0 ? Math.round((doneRuns/totalRuns)*100) : 0;
  const race = new Date('2026-10-10');
  const daysToRace = Math.max(0, Math.ceil((race - today) / 86400000));

  el.innerHTML = `
    <div class="stats-card">
      <div class="stats-grid">
        <div><div class="stats-stat-num">${doneRuns}</div><div class="stats-stat-lbl">Runs completed</div></div>
        <div><div class="stats-stat-num">${fmt(totalKm)}</div><div class="stats-stat-lbl">Total km</div></div>
        <div><div class="stats-stat-num">${doneStrSessions}</div><div class="stats-stat-lbl">Strength sessions</div></div>
        <div><div class="stats-stat-num">${missedRuns}</div><div class="stats-stat-lbl">Runs missed</div></div>
      </div>
    </div>
    <div class="stats-card">
      <div class="stats-grid">
        <div><div class="stats-stat-num">${fmt(longestRun)}</div><div class="stats-stat-lbl">Longest run (km)</div></div>
        <div><div class="stats-stat-num">${pctDone}%</div><div class="stats-stat-lbl">Plan completed</div></div>
        <div><div class="stats-stat-num">${Math.round(totalStrMins/60*10)/10}</div><div class="stats-stat-lbl">Strength hours</div></div>
        <div><div class="stats-stat-num">${daysToRace}</div><div class="stats-stat-lbl">Days to race</div></div>
      </div>
    </div>`;
}

        ondragend="strDragEnd(event)"
        ondragover="strItemOver(event,'${sec.key}',${i})">
        <span class="str-drag-handle">⠿</span>
        <span class="str-item-text" id="str-text-${sec.key}-${i}" onclick="startStrEdit('${sec.key}',${i})">${esc(ex)}</span>
        <input class="str-item-input" id="str-inp-${sec.key}-${i}" type="text" value="${escA(ex)}" style="display:none;" onblur="finishStrEdit('${sec.key}',${i})" onkeydown="strEditKey(event,'${sec.key}',${i})">
        <button class="str-del" onclick="delExercise('${sec.key}',${i})" title="Remove">×</button>
      </div>`;
    });
    html += `</div>
      <div class="add-exercise-row" id="add-row-${sec.key}" style="display:none;">
        <input type="text" id="new-ex-${sec.key}" placeholder="New exercise…" onkeydown="if(event.key==='Enter') addExercise('${sec.key}'); else if(event.key==='Escape') hideAddRow('${sec.key}')">
        <button onclick="addExercise('${sec.key}')">Add</button>
      </div>
      <div class="str-card-footer">
        <button class="str-add-btn" onclick="showAddRow('${sec.key}')" id="add-btn-${sec.key}" title="Add exercise">+</button>
      </div>
    </div>`;
  });

  // Add block button at the bottom
  html += `<div class="str-add-block-wrap">
    <button class="str-add-block-btn" onclick="addStrBlock()">+ Add block</button>
  </div>`;

  document.getElementById('strGrid').innerHTML = html;

  // Focus any open title input
  sections.forEach(sec => {
    if(state[`strTitle_editing_${sec.key}`]){
      const inp = document.getElementById(`str-title-inp-${sec.key}`);
      if(inp){ inp.focus(); inp.select(); }
    }
  });
}

function startStrTitle(key){
  state[`strTitle_editing_${key}`] = true;
  renderStrength();
}

function finishStrTitle(key){
  const inp = document.getElementById(`str-title-inp-${key}`);
  if(!inp) return;
  const val = inp.value.trim() || 'Block';
  const sections = getStrSections();
  const sec = sections.find(s=>s.key===key);
  if(sec) sec.title = val;
  state.strSections = sections;
  delete state[`strTitle_editing_${key}`];
  forceSyncNow();
  renderStrength();
}

function addStrBlock(){
  const sections = getStrSections();
  const key = `strCustom_${Date.now()}`;
  sections.push({key, title:'New Block'});
  state.strSections = sections;
  state[key] = [];
  forceSyncNow();
  renderStrength();
}

function delStrBlock(key){
  const sections = getStrSections().filter(s=>s.key!==key);
  state.strSections = sections;
  delete state[key];
  forceSyncNow();
  renderStrength();
}

// ── STRENGTH DRAG & DROP ──────────────────────────────────────────────────────
let dragSrc = null; // {key, i}

function strDragStart(evt, key, i){
  dragSrc = {key, i};
  evt.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{ const el=document.getElementById(`si-${key}-${i}`); if(el) el.classList.add('dragging'); }, 0);
}
function strDragEnd(evt){
  document.querySelectorAll('.str-item').forEach(el=>el.classList.remove('dragging','drag-target'));
  document.querySelectorAll('.str-card').forEach(el=>el.classList.remove('drag-over'));
}
function strDragOver(evt, key){
  evt.preventDefault();
  evt.dataTransfer.dropEffect='move';
  const card=document.getElementById(`card-${key}`);
  if(card) card.classList.add('drag-over');
}
function strDragLeave(evt, key){
  const card=document.getElementById(`card-${key}`);
  if(card) card.classList.remove('drag-over');
}
function strItemOver(evt, key, i){
  evt.preventDefault();
  document.querySelectorAll('.str-item').forEach(el=>el.classList.remove('drag-target'));
  const el=document.getElementById(`si-${key}-${i}`);
  if(el) el.classList.add('drag-target');
}
function strDrop(evt, destKey){
  evt.preventDefault();
  if(!dragSrc) return;
  const {key:srcKey, i:srcIdx} = dragSrc;
  dragSrc = null;

  // find drop position — which item was targeted?
  const items = document.getElementById(`card-${destKey}`).querySelectorAll('.str-item.drag-target');
  let destIdx = (state[destKey]||[]).length; // default: end of list
  if(items.length){
    const m = items[0].id.match(/-(\d+)$/);
    if(m) destIdx = parseInt(m[1]);
  }

  const srcList = [...(state[srcKey]||[])];
  const destList = srcKey===destKey ? srcList : [...(state[destKey]||[])];

  const [moved] = srcList.splice(srcIdx, 1);

  if(srcKey === destKey){
    srcList.splice(destIdx > srcIdx ? destIdx-1 : destIdx, 0, moved);
    state[srcKey] = srcList;
  } else {
    state[srcKey] = srcList;
    destList.splice(destIdx, 0, moved);
    state[destKey] = destList;
  }

  forceSyncNow();
  renderStrength();
}

function startStrEdit(key, i){
  document.getElementById(`str-text-${key}-${i}`).style.display='none';
  const inp = document.getElementById(`str-inp-${key}-${i}`);
  inp.style.display='inline-block'; inp.focus(); inp.select();
}
function finishStrEdit(key, i){
  const inp = document.getElementById(`str-inp-${key}-${i}`);
  const txt = document.getElementById(`str-text-${key}-${i}`);
  if(!inp||!txt) return;
  state[key][i] = inp.value; forceSyncNow();
  txt.textContent = inp.value;
  inp.style.display='none'; txt.style.display='inline';
}
function strEditKey(evt, key, i){ if(evt.key==='Enter'||evt.key==='Escape') finishStrEdit(key,i); }
function delExercise(key, i){ state[key].splice(i,1); forceSyncNow(); renderStrength(); }
function showAddRow(key){
  const row=document.getElementById(`add-row-${key}`);
  const btn=document.getElementById(`add-btn-${key}`);
  if(row){ row.style.display='flex'; }
  if(btn){ btn.style.display='none'; }
  const inp = document.getElementById(`new-ex-${key}`);
  if(inp){
    setTimeout(()=>{ inp.focus(); }, 30);
    inp.onblur = ()=>{ setTimeout(()=>hideAddRow(key), 160); };
  }
}
function hideAddRow(key){
  const row=document.getElementById(`add-row-${key}`);
  const btn=document.getElementById(`add-btn-${key}`);
  if(row){ row.style.display='none'; const inp=document.getElementById(`new-ex-${key}`); if(inp) inp.value=''; }
  if(btn){ btn.style.display='inline-block'; }
}
function addExercise(key){
  const inp = document.getElementById(`new-ex-${key}`);
  if(!inp||!inp.value.trim()) return;
  state[key].push(inp.value.trim()); forceSyncNow();
  renderStrength();
}
function resetStrength(key){
  const map = {strA:'A',strAcore:'Acore',strB:'B',strPC:'PC'};
  state[key] = [...DEFAULT_STR[map[key]]]; forceSyncNow(); renderStrength();
}

// ── UNIFIED TEXT (replaces title + note) ─────────────────────────────────────
function startTextEdit(wn, di){
  const el = document.getElementById(`dt-${wn}-${di}`);
  if(!el || el.tagName === 'INPUT') return;
  const k=dk(wn,di); if(!state[k]) state[k]={};
  const text = state[k].text != null ? state[k].text : (state[k].title != null ? state[k].title : (findWeek(wn)?.days[di]?.t || ''));
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'day-text-input';
  inp.id = `dt-${wn}-${di}`;
  inp.value = text;
  inp.onblur = ()=>saveText(wn,di);
  inp.onkeydown = (e)=>{ if(e.key==='Enter'||e.key==='Escape'){ e.preventDefault(); saveText(wn,di); } };
  inp.onclick = (e)=>e.stopPropagation();
  el.replaceWith(inp);
  inp.focus();
  inp.selectionStart = inp.selectionEnd = inp.value.length;
}

// ── PILL DRAG
function saveText(wn, di){
  const inp = document.getElementById(`dt-${wn}-${di}`);
  if(!inp || inp.tagName !== 'INPUT') return;
  const k=dk(wn,di); if(!state[k]) state[k]={};
  const val = inp.value;
  state[k].text = val;
  delete state[k].textEditing;
  // Discrete action (blur / Enter) — push immediately so quickly closing
  // the app after editing a day's text doesn't drop the change.
  forceSyncNow();
  const span = document.createElement('span');
  if(val === ''){
    span.className = 'day-text-display day-text-empty';
    span.textContent = '+ note';
  } else {
    span.className = 'day-text-display';
    span.textContent = val;
  }
  span.id = `dt-${wn}-${di}`;
  span.onclick = (e)=>{ e.stopPropagation(); startTextEdit(wn,di); };
  inp.replaceWith(span);
}

function textKey(evt, wn, di){
  if(evt.key==='Enter'||evt.key==='Escape'){ evt.preventDefault(); saveText(wn,di); }
}

// ── PILL DRAG (reorder within day OR move to another day) ────────────────────
let pillDrag = null; // {wn, di, idx, id, isPlanned}

function pillDragStart(evt, wn, di, idx){
  const k=dk(wn,di);
  const id = (state[k]?.added||[])[idx];
  pillDrag = {wn, di, idx, id, isPlanned:false};
  evt.dataTransfer.effectAllowed = 'move';
  evt.dataTransfer.setData('text/plain','pill');
  setTimeout(()=>evt.currentTarget.style.opacity='0.4', 0);
}

function pillDragStartPlanned(evt, wn, di){
  const w=findWeek(wn); const tag=w?.days[di]?.tag;
  pillDrag = {wn, di, idx:-1, id:tag, isPlanned:true};
  evt.dataTransfer.effectAllowed = 'move';
  evt.dataTransfer.setData('text/plain','pill');
  setTimeout(()=>evt.currentTarget.style.opacity='0.4', 0);
}

function pillDragEnd(evt){ evt.currentTarget.style.opacity=''; }

function pillDragOver(evt, wn, di, idx){
  if(!pillDrag) return;
  evt.preventDefault();
  evt.stopPropagation();
  evt.currentTarget.style.outline='2px solid #087E8B';
}
function pillDragLeave(evt){ evt.currentTarget.style.outline=''; }

function pillDrop(evt, wn, di, idx){
  evt.currentTarget.style.outline='';
  evt.stopPropagation();
  if(!pillDrag) return;
  const src = pillDrag; pillDrag=null;

  if(src.isPlanned){
    // can't really move planned tag, ignore
    return;
  }

  const srcK=dk(src.wn,src.di); const dstK=dk(wn,di);
  if(!state[srcK]) state[srcK]={};

  // same day reorder
  if(src.wn===wn && src.di===di){
    const arr=[...(state[srcK].added||[])];
    const [m]=arr.splice(src.idx,1);
    arr.splice(idx,0,m);
    state[srcK].added=arr; forceSyncNow();
  } else {
    // move to another day: remove from src, add to dest at position idx
    const srcArr=[...(state[srcK].added||[])];
    srcArr.splice(src.idx,1);
    state[srcK].added=srcArr;
    if(!state[dstK]) state[dstK]={};
    const dstArr=[...(state[dstK].added||[])];
    dstArr.splice(idx,0,src.id);
    state[dstK].added=dstArr;
    forceSyncNow();
    // refresh source day tags
    const srcTagsEl=document.getElementById(`tags-${src.wn}-${src.di}`);
    if(srcTagsEl){
      const sw=findWeek(src.wn); const sd=sw?.days[src.di];
      if(sd) srcTagsEl.innerHTML=plannedTagHtml(sd.tag,src.wn,src.di,!!state[srcK].plannedHidden)+addedTagsHtml(state[srcK],src.wn,src.di);
    }
    refreshKmCol(src.wn,src.di);
  }
  // refresh dest day tags
  const dstTagsEl=document.getElementById(`tags-${wn}-${di}`);
  if(dstTagsEl){
    const dw=findWeek(wn); const dd=dw?.days[di];
    if(dd) dstTagsEl.innerHTML=plannedTagHtml(dd.tag,wn,di,!!state[dstK].plannedHidden)+addedTagsHtml(state[dstK],wn,di);
  }
  refreshKmCol(wn,di);
}

// day-level drag-over (for when dragging over empty parts of a day row)
function dayDragOver(evt, wn, di){
  if(!pillDrag || (pillDrag.wn===wn && pillDrag.di===di)) return;
  evt.preventDefault();
  document.getElementById(`dr-${wn}-${di}`)?.classList.add('drag-target-day');
}
function dayDragLeave(evt, wn, di){
  document.getElementById(`dr-${wn}-${di}`)?.classList.remove('drag-target-day');
}
function dayDrop(evt, wn, di){
  document.getElementById(`dr-${wn}-${di}`)?.classList.remove('drag-target-day');
  if(!pillDrag || pillDrag.wn===wn && pillDrag.di===di) return;
  evt.preventDefault();
  // drop at end of added list
  const src=pillDrag; pillDrag=null;
  if(src.isPlanned) return;
  const srcK=dk(src.wn,src.di); const dstK=dk(wn,di);
  if(!state[srcK]) state[srcK]={};
  if(!state[dstK]) state[dstK]={};
  const srcArr=[...(state[srcK].added||[])];
  srcArr.splice(src.idx,1);
  state[srcK].added=srcArr;
  const dstArr=[...(state[dstK].added||[])];
  dstArr.push(src.id);
  state[dstK].added=dstArr;
  forceSyncNow();
  // refresh both days
  [src,{wn,di}].forEach(({wn:w2,di:d2})=>{
    const tagsEl=document.getElementById(`tags-${w2}-${d2}`);
    if(tagsEl){
      const pw=findWeek(w2); const pd=pw?.days[d2];
      const k2=dk(w2,d2);
      if(pd) refreshTagsArea(w2,d2);
    }
    refreshKmCol(w2,d2);
  });
}

// ── PLAN ─────────────────────────────────────────────────────────────────────
function addedTagsHtml(s, wn, di){
  const added = s.added || [];
  return added.map((id, idx) =>
    `<span class="tag ${ADDED_CLS[id]} tag-removable"
      draggable="true"
      ondragstart="pillDragStart(event,${wn},${di},${idx})"
      ondragend="pillDragEnd(event)"
      ondragover="pillDragOver(event,${wn},${di},${idx})"
      ondragleave="pillDragLeave(event)"
      ondrop="pillDrop(event,${wn},${di},${idx})"
      onclick="removeAdded(event,${wn},${di},'${id}')"
      title="Drag to move · click to remove">${ADDED_LABEL[id]}</span>`
  ).join('');
}

function plannedTagHtml(tag, wn, di, hidden){
  const cls = TAG_CLS[tag] || '';
  const label = TAG_LABEL[tag] || tag;
  if(hidden) return '';
  return `<span class="tag ${cls} tag-removable" id="ptag-${wn}-${di}" onclick="togglePlannedTag(${wn},${di})" title="Click to remove">${label}</span>`;
}

function renderPhase(){
  // Snapshot any open inline-edit input first so a mid-typed text edit isn't
  // lost when this re-render rebuilds the day rows.
  captureOpenEdits();
  const currentWeek = getCurrentWeek();
  let fullHtml = '';

  PHASES.forEach((p, phaseIdx) => {
    const noteKey = `phaseNote_${phaseIdx}`;
    const noteText = state[noteKey] != null ? state[noteKey] : p.note;
    const noteEditing = !!state[`phaseNoteEditing_${phaseIdx}`];
    const noteOpen = !!state[`phaseNoteOpen_${phaseIdx}`];
    let phaseNoteHtml;
    if(noteEditing){
      phaseNoteHtml = `<div class="phase-note">
        <div class="phase-note-toggle open" onclick="togglePhaseNote(${phaseIdx})">
          <span class="phase-note-title">${p.label}</span>
          <span class="pn-arrow">▶</span>
        </div>
        <div class="phase-note-body open">
          <div class="phase-note-inner">
            <textarea class="phase-note-edit" id="phase-note-ta-${phaseIdx}" style="display:block;">${esc(noteText)}</textarea>
            <div class="phase-note-actions">
              <button class="btn-save" onclick="savePhaseNote(${phaseIdx})">Save</button>
              <button class="btn-discard" onclick="cancelPhaseNote(${phaseIdx})">Cancel</button>
            </div>
          </div>
        </div>
      </div>`;
    } else {
      phaseNoteHtml = `<div class="phase-note">
        <div class="phase-note-toggle${noteOpen?' open':''}" onclick="togglePhaseNote(${phaseIdx})">
          <span class="phase-note-title">${p.label}</span>
          <span class="pn-arrow">▶</span>
        </div>
        <div class="phase-note-body${noteOpen?' open':''}">
          <div class="phase-note-inner">
            <span class="phase-note-display" onclick="editPhaseNote(${phaseIdx})" title="Click to edit">${noteText}</span>
          </div>
        </div>
      </div>`;
    }

    fullHtml += `<div class="phase-section" id="phase-section-${phaseIdx}">`;  // phase note removed

    p.weeks.forEach(w => {
      const wopen = !!openWeeks[w.n];
      const RUN_TYPES_P = ['easy','workout','ml','long'];
      // total = planned run days only (fixed)
      const totalRuns = w.days.filter((d,i) => {
        const s2 = state[dk(w.n,i)] || {};
        const plannedActive = RUN_TYPES_P.includes(d.tag) && !s2.plannedHidden;
        const hasAddedRun = (s2.added||[]).some(id => RUN_TYPES_P.includes(id));
        return plannedActive || hasAddedRun;
      }).length;
      // done = any run day (planned or added pill) with km logged
      const doneRuns = w.days.filter((d,i) => {
        const s2 = state[dk(w.n,i)] || {};
        const isPlannedRun = RUN_TYPES_P.includes(d.tag);
        const hasAddedRun = (s2.added||[]).some(id => RUN_TYPES_P.includes(id));
        if(!isPlannedRun && !hasAddedRun) return false;
        return parseFloat(s2.kmActual) > 0;
      }).length;
      const isCurrent = w.n === currentWeek;
      const wlabel = w.heading ? `W${w.n} — ${esc(w.heading)}` : `W${w.n}`;

      let actualTotal = 0;
      w.days.forEach((_,i) => { const v = parseFloat((state[dk(w.n,i)]||{}).kmActual); if(!isNaN(v)) actualTotal += v; });
      const hasActual = actualTotal > 0;

      const RUN_TAGS_KM = ['easy','workout','ml','long'];
      const plannedKmStr = w.km;

      // Compute actual run km and actual total km
      let actualRunKm = 0;
      w.days.forEach((d,i) => {
        const s2 = state[dk(w.n,i)] || {};
        const isRun = RUN_TAGS_KM.includes(d.tag) || (s2.added||[]).some(id=>RUN_TAGS_KM.includes(id));
        if(isRun){ const v = parseFloat(s2.kmActual); if(!isNaN(v)) actualRunKm += v; }
      });
      const fmt = v => { if(v%1===0) return v; const s=v.toFixed(2); return parseFloat(s).toString(); };

      let badgeHtml;
      if(w.km === 'Race'){
        badgeHtml = `<span class="km-badge" style="background:#faeeda;color:#633806;">Race</span>`;
      } else {
        const actualLine = actualRunKm > 0 ? `<span class="km-actual-badge">${fmt(actualRunKm)}</span>` : '';
        const sep = actualRunKm > 0 ? `<span class="km-planned-line">/${plannedKmStr}km</span>` : `<span class="km-planned-line">${plannedKmStr}km</span>`;
        badgeHtml = `<div class="km-badge-wrap">${actualLine}${sep}</div>`;
      }

      // Run icons
      const RUN_TAGS_ICON = ['easy','workout','ml','long'];
      const runDayIndices = [];
      w.days.forEach((d,i)=>{
        const s2=state[dk(w.n,i)]||{};
        const active=(RUN_TAGS_ICON.includes(d.tag)&&!s2.plannedHidden)||((s2.added||[]).some(id=>RUN_TAGS_ICON.includes(id)));
        if(active) runDayIndices.push(i);
      });
      const runIcons = runDayIndices.map(i=>{
        const s2=state[dk(w.n,i)]||{};
        const done=parseFloat(s2.kmActual)>0;
        return `<span class="run-icon${done?' filled':''}"></span>`;
      }).join('');

      // Phase label for top-right
      const phaseLabel = PHASES.find(p=>p.weeks.some(x=>x.n===w.n))?.shortLabel || '';

      fullHtml += `<div class="week${isCurrent?' current-week':''}" id="week-${w.n}">
        <div class="week-hdr" onclick="toggleWeek(${w.n})">
          <div class="week-hdr-top">
            <div>
              <span class="week-title">${wlabel}</span>
              <span class="week-date">${w.date}</span>
              ${isCurrent ? '<span class="current-label">Current</span>' : ''}
            </div>
            <span class="week-phase-label">${phaseLabel}</span>
          </div>
          <div class="week-run-icons" id="icons-${w.n}">${runIcons}</div>
          <div class="week-stats-row">
            <span class="week-runs-stat" id="prog-${w.n}">${totalRuns>0?`<span class="done-count">${doneRuns}</span><span style="color:#bbb;font-weight:400;">/${totalRuns} runs</span>`:''}</span>
            ${w.km==='Race' ? '<span style="font-size:14px;color:#bbb;">Race day</span>' : badgeHtml}
          </div>
        </div>
        <div class="week-body${wopen?' open':''}">`;

      w.days.forEach((day, di) => {
        const k = dk(w.n, di);
        const s = state[k] || {};
        // unified text: use s.text (new field), fall back to s.title, then day default
        const text = s.text != null ? s.text : (s.title != null ? s.title : day.t);
        const isDefault = text === day.t;
        const isEmpty = text === '';
        const plannedHidden = !!s.plannedHidden;
        const dropOpen = openDropdown === `${w.n}-${di}`;
        const kmActual = s.kmActual || '';
        const textEditing = !!s.textEditing;

        const dayOfWeek = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(day.d);
        const weekStart = WEEK_STARTS[w.n];
        let dayDate = null;
        if(weekStart){ dayDate = new Date(weekStart); dayDate.setUTCDate(dayDate.getUTCDate() + dayOfWeek); }
        // Compare on UTC day to match how plan dates are anchored
        let isPast = false;
        if(dayDate){
          const now = new Date();
          const todayUtcMidnight = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
          isPast = dayDate.getTime() < todayUtcMidnight;
        }

        const RUN_TYPES = ['easy','workout','ml','long'];
        const plannedIsRun = !plannedHidden && RUN_TYPES.includes(day.tag);
        const addedHasRun = (s.added||[]).some(id => RUN_TYPES.includes(id));
        const showKm = plannedIsRun || addedHasRun;
        // MISSED = day is past AND there's a planned run AND user hasn't ticked the checkbox.
        // Strava-synced km no longer auto-clears MISSED — only ticking the box does.
        const isMissedRun = isPast && (plannedIsRun || addedHasRun) && !s.done;

        // Strength duration
        const strengthMins = s.strengthMins || '';
        const isStrDay = ['sa','sb','sl','strength'].includes(day.tag)||((s.added||[]).some(t=>['sa','sb','sl','strength'].includes(t)));
        const strHtml = isStrDay && strengthMins ? `<span class="strava-stat">${strengthMins} min</span>` : '';

        const kmColHtml = showKm
          ? `<div class="km-col">${isMissedRun ? '<span class="missed-label">MISSED</span>' : ''}${kmActual ? `<span class="strava-stat">${kmActual} km</span>` : '<span class="strava-stat pending">—</span>'}</div>`
          : strHtml ? `<div class="km-col">${strHtml}</div>` : `<div class="km-col"></div>`;

        // text display: always render as span; editing handled by DOM swap in startTextEdit
        let textDisplay;
        if(isEmpty){

        } else {
          textDisplay = `<span class="day-text-display" id="dt-${w.n}-${di}" onclick="startTextEdit(${w.n},${di})">${esc(text)}</span>`;
        }

        const isDone = !!s.done;
        const kmDisplay = showKm
          ? (isMissedRun ? `<span class="missed-label">MISSED</span>` : (kmActual ? `<span class="strava-stat">${(()=>{ const n=parseFloat(kmActual); if(isNaN(n)) return kmActual; if(n%1===0) return n; const s=n.toFixed(2); return parseFloat(s).toString(); })()} km</span>` : `<span class="strava-stat pending">—</span>`))
          : strHtml || '';

        fullHtml += `<div class="day-row${isPast?' past':''}${isMissedRun?' missed-run':''}${isDone?' done':''}" id="dr-${w.n}-${di}"
          ondragover="dayDragOver(event,${w.n},${di})"
          ondragleave="dayDragLeave(event,${w.n},${di})"
          ondrop="dayDrop(event,${w.n},${di})">
          <div class="day-col-left">
            <div class="day-label">${day.d}</div>
          </div>
          <div class="day-col-middle">
            <div class="tags-area" id="tags-${w.n}-${di}">
              ${plannedTagHtml(day.tag, w.n, di, plannedHidden)}
              ${addedTagsHtml(s, w.n, di)}
              <div style="position:relative;display:inline-flex;">
                <button class="add-btn" onclick="toggleDropdown(event,${w.n},${di})" title="Add activity">+</button>
              </div>
            </div>
            <div class="day-main">${textDisplay}</div>
          </div>
          <div class="day-col-right">
            <input type="checkbox" class="day-check" ${isDone?'checked':''} onchange="toggleDone(${w.n},${di},this)" onclick="event.stopPropagation()">
            <div class="day-col-km">${kmDisplay}</div>
          </div>
        </div>`;
      });

      fullHtml += `</div></div>`;
    });

    fullHtml += `</div>`; // close phase-section
  });

  document.getElementById('content').innerHTML = fullHtml;

  // auto-focus any open phase note textarea
  PHASES.forEach((_,pi) => {
    if(state[`phaseNoteEditing_${pi}`]){
      const ta = document.getElementById(`phase-note-ta-${pi}`);
      if(ta){ ta.style.height=ta.scrollHeight+'px'; setTimeout(()=>ta.focus(), 30); }
    }
  });
}

function buildDropdown(wn, di, s){
  const added = s.added || [];
  let h = '';
  EXTRA_OPTIONS.forEach(section => {
    h += `<div class="drop-section">${section.section}</div><div class="drop-pills">`;
    section.items.forEach(item => {
      const sel = added.includes(item.id);
      h += `<span class="drop-pill ${item.cls}${sel?' selected':''}" onclick="toggleAdded(${wn},${di},'${item.id}')">${item.label}</span>`;
    });
    h += `</div>`;
  });
  return h;
}

// scroll-spy: watch phase sections and update active nav btn
function initScrollSpy(){
  function updateActivPhase(){
    const navH = document.querySelector('.sticky-top')?.offsetHeight || 100;
    const scrollEl2 = document.getElementById('content-scroll');
  const scrollY = (scrollEl2 ? scrollEl2.scrollTop : window.scrollY) + navH + 20;
    let current = 0;
    PHASES.forEach((_,i)=>{
      const el = document.getElementById(`phase-section-${i}`);
      if(el && el.getBoundingClientRect().top + window.scrollY <= scrollY) current = i;

      activePhase = current;
      document.querySelectorAll('.phase-btn').forEach((b,i)=>b.classList.toggle('active',i===activePhase));

function updateProgress(wn){
  let w = null;
  for(const p of PHASES){ w = p.weeks.find(x=>x.n===wn); if(w) break; }
  if(!w) return;
  const RUN_TYPES_P = ['easy','workout','ml','long'];
  const totalRuns = w.days.filter((d,i)=>{
    const s2 = state[dk(wn,i)] || {};
    const plannedActive = RUN_TYPES_P.includes(d.tag) && !s2.plannedHidden;
    const hasAddedRun = (s2.added||[]).some(id=>RUN_TYPES_P.includes(id));
    return plannedActive || hasAddedRun;
  }).length;
  const doneRuns = w.days.filter((d,i)=>{
    const s2 = state[dk(wn,i)] || {};
    const plannedActive = RUN_TYPES_P.includes(d.tag) && !s2.plannedHidden;
    const hasAddedRun = (s2.added||[]).some(id=>RUN_TYPES_P.includes(id));
    return (plannedActive||hasAddedRun) && parseFloat(s2.kmActual) > 0;
  }).length;
  const el=document.getElementById(`prog-${wn}`);
  if(el) el.innerHTML = totalRuns>0 ? `<span class="done-count">${doneRuns}</span><span style="color:#bbb;font-weight:400;">/${totalRuns} runs</span>` : '';
  // refresh run icons
  const iconRow = document.querySelector(`#icons-${wn}`);
  if(iconRow){
    const icons = iconRow.querySelectorAll('.run-icon');
    let si = 0;
    w.days.forEach((d,i)=>{
      const s2=state[dk(wn,i)]||{};
      const active=(RUN_TYPES_P.includes(d.tag)&&!s2.plannedHidden)||((s2.added||[]).some(id=>RUN_TYPES_P.includes(id)));
      if(active && icons[si]){
        icons[si].classList.toggle('filled', parseFloat(s2.kmActual)>0);
        si++;
      }
    });
  }
}

function toggleDone(wn,di,el){
  const k=dk(wn,di); if(!state[k]) state[k]={};
  state[k].done=el.checked;
  // Discrete user action — push immediately so a tab close right after
  // doesn't drop the tick in the debounce window.
  forceSyncNow();
  document.getElementById(`dr-${wn}-${di}`)?.classList.toggle('done',el.checked);
  const main=document.querySelector(`#dr-${wn}-${di} .day-main`);
  if(main) main.style.opacity=el.checked?'0.45':'1';
  // Ticking/unticking changes MISSED state immediately
  refreshKmCol(wn, di);
  updateProgress(wn);
}

function findWeek(wn){ for(const p of PHASES){ const w=p.weeks.find(x=>x.n===wn); if(w) return w; } return null; }

// Snapshot any open inline-edit input into state BEFORE a re-render destroys
// it. Day-text inputs and strength-item inputs sit inside containers that get
// replaced wholesale by renderPhase / renderStrength, and if the user is mid-
// typing when the re-render fires (pull-on-load, pull-on-visibility, dropdown
// close handler, etc.) the input element vanishes before blur ever fires —
// which means saveText/finishStrEdit never run and the typed text is lost.
// Calling this before every full re-render makes those edits survive.
function captureOpenEdits(){
  let touched = false;
  // Day-text inputs in the plan tab
  document.querySelectorAll('input.day-text-input').forEach(inp => {
    const m = inp.id && String(inp.id).match(/^dt-(\d+)-(\d+)$/);
    if(!m) return;
    const wn = parseInt(m[1],10), di = parseInt(m[2],10);
    const k = dk(wn, di);
    if(!state[k]) state[k] = {};
    const val = inp.value;
    if(state[k].text !== val){
      state[k].text = val;
      touched = true;
    }
  });
  // Strength exercise inputs (only when actually visible / in edit mode)
  document.querySelectorAll('input.str-item-input').forEach(inp => {
    if(inp.style && inp.style.display === 'none') return;
    const m = inp.id && String(inp.id).match(/^str-inp-(.+)-(\d+)$/);
    if(!m) return;
    const key = m[1], i = parseInt(m[2],10);
    if(Array.isArray(state[key]) && state[key][i] !== inp.value){
      state[key][i] = inp.value;
      touched = true;
    }
  });
  // Strength block title rename input
  document.querySelectorAll('input.str-title-input').forEach(inp => {
    const m = inp.id && String(inp.id).match(/^str-title-inp-(.+)$/);
    if(!m) return;
    const key = m[1];
    const sections = state.strSections;
    if(Array.isArray(sections)){
      const sec = sections.find(s => s.key === key);
      const val = (inp.value||'').trim() || 'Block';
      if(sec && sec.title !== val){ sec.title = val; touched = true; }
    }
  });
  if(touched){
    // Persist the rescued edits — debounced is fine; the user will get an
    // immediate push from whatever triggered the re-render (toggleAdded etc.)
    // or from the explicit save in the next user action.
    save();
  }
  return touched;
}

function refreshKmCol(wn, di){
  // With the new 2-row layout, just re-render the whole day row
  const w=findWeek(wn); if(!w) return;
  const day=w.days[di]; if(!day) return;
  const k=dk(wn,di); const s=state[k]||{};
  const RUN_TYPES=['easy','workout','ml','long'];
  const plannedIsRun = !s.plannedHidden && RUN_TYPES.includes(day.tag);
  const addedHasRun = (s.added||[]).some(id=>RUN_TYPES.includes(id));
  const showKm = plannedIsRun || addedHasRun;
  const row = document.getElementById(`dr-${wn}-${di}`);
  if(!row) return;
  const dayOfWeek = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(day.d);
  const weekStart = WEEK_STARTS[wn];
  let dayDate = null;
  if(weekStart){ dayDate = new Date(weekStart); dayDate.setUTCDate(dayDate.getUTCDate()+dayOfWeek); }
  let isPast = false;
  if(dayDate){
    const now = new Date();
    const todayUtcMidnight = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
    isPast = dayDate.getTime() < todayUtcMidnight;
  }
  const kmActual = s.kmActual||'';
  const isMissed = isPast && showKm && !s.done;
  row.classList.toggle('missed-run', isMissed);

  // Update the bottom-right km cell with current MISSED / km / pending state.
  const kmCell = row.querySelector('.day-col-right .day-col-km');
  if(!kmCell) return;
  const fmt = v => { const n=parseFloat(v); if(isNaN(n)) return v; if(n%1===0) return n; return parseFloat(n.toFixed(2)).toString(); };
  const strengthMins = s.strengthMins || '';
  const isStrDay = ['sa','sb','sl','strength'].includes(day.tag)||((s.added||[]).some(t=>['sa','sb','sl','strength'].includes(t)));
  const strHtml = isStrDay && strengthMins ? `<span class="strava-stat">${strengthMins} min</span>` : '';
  const kmDisplay = showKm
    ? (isMissed ? `<span class="missed-label">MISSED</span>` : (kmActual ? `<span class="strava-stat">${fmt(kmActual)} km</span>` : `<span class="strava-stat pending">—</span>`))
    : (strHtml || '');
  kmCell.innerHTML = kmDisplay;
}

function refreshTagsArea(wn, di){
  const tagsEl = document.getElementById(`tags-${wn}-${di}`);
  if(!tagsEl) return;
  const w = findWeek(wn); if(!w) return;

}

function togglePlannedTag(wn, di){

// Anchor stores the trigger button's position; final dropdown coords are
// computed after render against the dropdown's actual measured size so it
// always lands inside the viewport, regardless of viewport size, scroll,
// or how many pills the dropdown content has wrapped onto.
let openDropdownRect = null; // { btnTop, btnBottom, btnLeft, btnRight }

function renderDropdownPortal(){
  const portal = document.getElementById('dropdown-portal');
  if(!portal) return;
  if(!openDropdown){ portal.innerHTML=''; portal.style.pointerEvents='none'; return; }
  const [wn,di] = openDropdown.split('-').map(Number);
  const w = findWeek(wn); if(!w){ portal.innerHTML=''; return; }
  const s = state[dk(wn,di)]||{};
  // Render off-screen first so we can measure the real size, then clamp.
  portal.style.pointerEvents = 'auto';
  portal.innerHTML = `<div class="add-dropdown" id="drop-${wn}-${di}"
    style="top:-9999px;left:-9999px;visibility:hidden;pointer-events:auto;"
    onclick="event.stopPropagation()">${buildDropdown(wn,di,s)}</div>`;

  const dropEl = document.getElementById(`drop-${wn}-${di}`);
  if(!dropEl) return;
  // Defer one frame so layout is finalised before measuring.
  requestAnimationFrame(() => {
    positionDropdown(dropEl);
  });
}

function positionDropdown(dropEl){
  const r = openDropdownRect;
  if(!r || !dropEl) return;
  const margin = 8;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const dr = dropEl.getBoundingClientRect();
  const dropW = dr.width || 210;
  const dropH = dr.height || 280;

  // Vertical: prefer below the button, fall back to above, then clamp.
  let top;
  const spaceBelow = vh - r.btnBottom - margin;
  const spaceAbove = r.btnTop - margin;
  if(dropH <= spaceBelow){
    top = r.btnBottom + 4;
  } else if(dropH <= spaceAbove){
    top = r.btnTop - dropH - 4;
  } else {
    // No room either way — keep it on screen, prefer larger space
    if(spaceBelow >= spaceAbove){
      top = Math.max(margin, vh - dropH - margin);
    } else {
      top = margin;
    }
  }

  // Horizontal: prefer right-aligned to the button (extending leftward),
  // fall back to left-aligned, then clamp to viewport.
  let left;
  if(r.btnRight - dropW >= margin){
    left = r.btnRight - dropW;
  } else if(r.btnLeft + dropW + margin <= vw){
    left = r.btnLeft;
  } else {
    left = Math.max(margin, vw - dropW - margin);
  }

  // Final clamp on all sides
  top  = Math.max(margin, Math.min(top,  vh - dropH - margin));
  left = Math.max(margin, Math.min(left, vw - dropW - margin));

  dropEl.style.top = top + 'px';
  dropEl.style.left = left + 'px';
  dropEl.style.visibility = 'visible';
}

function toggleDropdown(evt,wn,di){
  evt.stopPropagation();
  const key=`${wn}-${di}`;
  if(openDropdown===key){ openDropdown=null; openDropdownRect=null; renderDropdownPortal(); return; }
  openDropdown=key;
  const btn = evt.currentTarget;
  const r = btn.getBoundingClientRect();
  openDropdownRect = {
    btnTop: r.top,
    btnBottom: r.bottom,
    btnLeft: r.left,
    btnRight: r.right,
  };
  renderDropdownPortal();
}

function toggleAdded(wn,di,id){
  const k=dk(wn,di); if(!state[k]) state[k]={};
  if(!state[k].added) state[k].added=[];
  const idx=state[k].added.indexOf(id);
  if(idx>=0) state[k].added.splice(idx,1);
  else state[k].added.push(id);
  forceSyncNow();
  openDropdown = null; // close dropdown after selection
  openDropdownRect = null;
  // CRITICAL: tear down the portal properly. Just removing the inner drop element
  // leaves portal.pointer-events:auto, which makes the full-screen overlay swallow
  // every subsequent click — i.e. the whole app appears frozen.
  renderDropdownPortal();
  const tagsEl=document.getElementById(`tags-${wn}-${di}`);
  if(tagsEl){
    const w=findWeek(wn); const day=w?w.days[di]:null; if(!day) return;
    const s=state[k];
    refreshTagsArea(wn,di);
  }
  // restore add-btn if it got clobbered
  // add-btn is in day-col-add, not affected by tag updates
  refreshKmCol(wn,di);
  updateProgress(wn);
}

function removeAdded(evt,wn,di,id){
  evt.stopPropagation();
  const k=dk(wn,di); if(!state[k]) return;
  state[k].added=(state[k].added||[]).filter(x=>x!==id); forceSyncNow();
  openDropdown = null;
  openDropdownRect = null;
  // Ensure the portal is fully torn down (pointer-events back to 'none').
  renderDropdownPortal();
  const tagsEl=document.getElementById(`tags-${wn}-${di}`);
  if(tagsEl){
    const w=findWeek(wn); const day=w?w.days[di]:null; if(!day) return;
    const s=state[k];
    refreshTagsArea(wn,di);
  }
  refreshKmCol(wn,di);
  updateProgress(wn);
}

function renderDailyQuote(){
  const race = new Date('2026-10-10');
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Math.max(0, Math.ceil((race - today) / 86400000));
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(),0,0)) / 86400000);
  const q = days === 0 ? RACE_DAY_QUOTE : QUOTES[dayOfYear % QUOTES.length];

  // Logo is a fixed global element — no JS needed

  // Quote
  const homeQ = document.getElementById('home-quote');
  if(homeQ) homeQ.innerHTML = q.replace(/\n/g,'<br>');

  // Countdown
  const homeCd = document.getElementById('home-countdown');
  if(homeCd){
    if(days===0){
      homeCd.innerHTML = `<div class="home-stat"><span class="home-stat-num orange">Go!</span><span class="home-stat-lbl">Race day</span></div>`;
    } else {
      homeCd.innerHTML = `<div class="home-stat"><span class="home-stat-num teal">${days}</span><span class="home-stat-lbl">days to go</span></div>`;
    }
  }
}

function renderKmTotal(){
  let total = 0;
  PHASES.forEach(p => p.weeks.forEach(w => w.days.forEach((_,di) => {
    const v = parseFloat((state[dk(w.n,di)]||{}).kmActual);
    if(!isNaN(v)) total += v;
  })));
  const el = document.getElementById('home-km');
  if(!el) return;
  if(total > 0){
    el.innerHTML = `<div class="home-stat"><span class="home-stat-num teal">${total%1===0?total:total.toFixed(1)}</span><span class="home-stat-lbl">km run</span></div>`;
  } else {
    el.innerHTML = '';
  }
}
